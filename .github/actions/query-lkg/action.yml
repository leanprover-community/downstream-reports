name: 'Query LKG'
description: >
  Look up a downstream's last-known-good mathlib commit from the LKG snapshot.
  Accepts either a downstream name (e.g. "physlib") or a full repo slug
  (e.g. "leanprover-community/physlib"). Defaults to the current repository.

inputs:
  downstream:
    required: false
    default: ${{ github.repository }}
    description: >
      Downstream to look up. May be a registered downstream name (e.g. "physlib")
      or a GitHub repo slug (e.g. "leanprover-community/physlib"). When the value
      contains a "/" it is treated as a repo slug; otherwise as a name key.
      Defaults to the repository running this action.
  snapshot-url:
    required: false
    default: 'https://downstreamreports.z13.web.core.windows.net/lkg/latest.json'
    description: >
      Full URL of the LKG snapshot JSON. Override for testing against a staging
      blob; leave empty to use the production URL.

outputs:
  lkg-commit:
    description: 'The last-known-good commit SHA for the downstream'
    value: ${{ steps.lookup.outputs.lkg_commit }}
  downstream-name:
    description: 'The downstream name key as registered in the snapshot'
    value: ${{ steps.lookup.outputs.downstream_name }}
  repo:
    description: 'The GitHub repo slug for the downstream (owner/repo)'
    value: ${{ steps.lookup.outputs.repo }}
  dependency-name:
    description: 'The dependency name field from the snapshot entry'
    value: ${{ steps.lookup.outputs.dependency_name }}

runs:
  using: 'composite'
  steps:
    - name: Fetch snapshot and look up downstream
      id: lookup
      shell: bash
      env:
        DOWNSTREAM: ${{ inputs.downstream }}
        SNAPSHOT_URL: ${{ inputs.snapshot-url }}
      run: bash "${{ github.action_path }}/../../scripts/fetch-lkg.sh"
