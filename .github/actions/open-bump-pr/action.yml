name: 'Open Bump PR'
description: >
  Commit working-tree changes and create or update a pull request.
  Accepts an optional message (e.g. the bump-description output from
  bump-to-latest) which is placed in the PR body above an automated footer.

inputs:
  branch:
    required: false
    default: 'hopscotch/lkg-bump'
    description: >
      Branch name for the PR. Each run creates a single fresh commit on top
      of the base branch, so the remote is replaced (force-pushed) every time.
      This keeps the PR to one commit and avoids accumulating bump history.
  base:
    required: false
    default: ''
    description: 'Base branch for the PR (defaults to the repo default branch)'
  title:
    required: false
    default: ''
    description: 'PR title'
  body:
    required: false
    default: ''
    description: 'Full PR body (overrides auto-generated message + footer)'
  commit-message:
    required: false
    default: ''
    description: 'Commit message (defaults to "chore: dependency update")'
  labels:
    required: false
    default: ''
    description: 'Comma-separated labels to apply to the PR'
  message:
    required: false
    default: ''
    description: >
      Content to place in the PR body above the automated footer.
      Pass the bump-description output from bump-to-latest here.
  token:
    required: false
    default: ${{ github.token }}
    description: >
      GitHub token used to push the branch and create/update the PR.
      Defaults to the built-in GITHUB_TOKEN. Pass a GitHub App installation
      token here to have PRs opened by a bot account instead of
      github-actions[bot].
  git-user-name:
    required: false
    default: 'github-actions[bot]'
    description: 'git user.name for the bump commit.'
  git-user-email:
    required: false
    default: '41898282+github-actions[bot]@users.noreply.github.com'
    description: 'git user.email for the bump commit.'

outputs:
  pr-number:
    description: 'PR number (empty if action=noop; populated for created / updated / up-to-date)'
    value: ${{ steps.resolve-outputs.outputs.pr_number }}
  pr-url:
    description: 'PR URL (empty if action=noop; populated for created / updated / up-to-date)'
    value: ${{ steps.resolve-outputs.outputs.pr_url }}
  action:
    description: >-
      "created" (new PR opened), "updated" (existing PR's title/body edited
      after a force-push), "up-to-date" (remote branch already had an
      identical tree at HEAD with an open PR pointing at it — no push, no
      edit), or "noop" (no working-tree changes vs HEAD, nothing to commit).
    value: ${{ steps.resolve-outputs.outputs.action }}

runs:
  using: 'composite'
  steps:
    # ------------------------------------------------------------------
    # Step 1: Check whether there are any file changes to commit.
    # ------------------------------------------------------------------
    - name: Check for working-tree changes
      id: check-changes
      shell: bash
      run: |
        if git diff --quiet && git diff --cached --quiet; then
          echo "No file changes detected — nothing to commit."
          echo "no_changes=true" >> "$GITHUB_OUTPUT"
        else
          echo "no_changes=false" >> "$GITHUB_OUTPUT"
        fi

    # ------------------------------------------------------------------
    # Step 2: Create the branch, commit, and force-push.
    #
    # Idempotency on unchanged input: if the remote branch already has a
    # commit whose tree matches the one we just composed, *and* an open PR
    # already points at that branch, skip the force-push (and the PR edit
    # downstream). Without this guard, a caller that runs on a sub-daily
    # cadence would force-push a fresh-SHA / same-tree commit every tick
    # and churn the awaiting-merge PR with a CI rerun and a timeline event
    # for no actual change. The git commit itself is always made locally
    # so that the tree comparison has a concrete object to diff against;
    # if the comparison says "no push needed" the local commit is simply
    # discarded when the runner exits.
    #
    # When the remote tree matches but no open PR exists (e.g. a closed
    # PR's branch was left around), we still push and let step 3 open a
    # new PR — the cheap path is correctness-preserving but doesn't apply.
    # ------------------------------------------------------------------
    - name: Commit and push branch
      id: commit-and-push
      if: steps.check-changes.outputs.no_changes != 'true'
      shell: bash
      env:
        BRANCH: ${{ inputs.branch }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
        TOKEN: ${{ inputs.token }}
        GH_TOKEN: ${{ inputs.token }}
        GIT_USER_NAME: ${{ inputs.git-user-name }}
        GIT_USER_EMAIL: ${{ inputs.git-user-email }}
      run: |
        set -euo pipefail

        MSG="${COMMIT_MESSAGE:-chore: dependency update}"

        git config user.name  "$GIT_USER_NAME"
        git config user.email "$GIT_USER_EMAIL"

        OLD_HEADER=$(git config --local http.https://github.com/.extraheader || true)
        git config --unset http.https://github.com/.extraheader || true

        PUSH_URL="https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

        git checkout -B "$BRANCH"
        git add -A
        git commit -m "$MSG"

        LOCAL_TREE=$(git rev-parse HEAD^{tree})

        # Probe the remote branch's tree, if the branch exists.
        REMOTE_TREE=""
        if git ls-remote --exit-code --heads "$PUSH_URL" "$BRANCH" >/dev/null 2>&1; then
          git fetch --depth=1 "$PUSH_URL" "$BRANCH"
          REMOTE_TREE=$(git rev-parse FETCH_HEAD^{tree})
        fi

        # If trees match, only short-circuit when an *open* PR is pointing
        # at the branch. Otherwise we'd silently fail to surface a PR for
        # a leftover branch from a previously-closed PR.
        TREE_UNCHANGED=false
        EXISTING_PR_NUMBER=""
        EXISTING_PR_URL=""
        if [ -n "$REMOTE_TREE" ] && [ "$LOCAL_TREE" = "$REMOTE_TREE" ]; then
          existing=$(gh pr list \
            --head "$BRANCH" \
            --state open \
            --json number,url \
            --jq '.[0] // empty')
          if [ -n "$existing" ]; then
            EXISTING_PR_NUMBER=$(echo "$existing" | jq -r '.number')
            EXISTING_PR_URL=$(echo "$existing"    | jq -r '.url')
            TREE_UNCHANGED=true
          fi
        fi

        if [ "$TREE_UNCHANGED" = "true" ]; then
          echo "Remote '$BRANCH' already at tree $LOCAL_TREE with open PR #$EXISTING_PR_NUMBER — skipping force-push."
        else
          git push --force "$PUSH_URL" "$BRANCH"
        fi

        echo "tree_unchanged=$TREE_UNCHANGED"           >> "$GITHUB_OUTPUT"
        echo "existing_pr_number=$EXISTING_PR_NUMBER"   >> "$GITHUB_OUTPUT"
        echo "existing_pr_url=$EXISTING_PR_URL"         >> "$GITHUB_OUTPUT"

        if [ -n "$OLD_HEADER" ]; then
          git config --local http.https://github.com/.extraheader "$OLD_HEADER"
        fi

    # ------------------------------------------------------------------
    # Step 3: Create or update the PR.
    #
    # Skipped when step 2 short-circuited via tree_unchanged. In that case
    # the remote branch already has the right tree and an open PR; editing
    # the PR's title/body would only churn the footer ("last updated on…")
    # and add a low-value event to the timeline.
    # ------------------------------------------------------------------
    - name: Create or update PR
      id: create-or-update-pr
      if: >-
        steps.check-changes.outputs.no_changes != 'true'
        && steps.commit-and-push.outputs.tree_unchanged != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        BRANCH: ${{ inputs.branch }}
        BASE: ${{ inputs.base }}
        TITLE: ${{ inputs.title }}
        BODY: ${{ inputs.body }}
        LABELS: ${{ inputs.labels }}
        MESSAGE: ${{ inputs.message }}
      run: |
        set -euo pipefail

        PR_TITLE="${TITLE:-chore: dependency update}"

        if [ -n "$BODY" ]; then
          PR_BODY="$BODY"
        else
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          TODAY=$(date -u +"%Y-%m-%d")
          FOOTER="_This PR was last updated on ${TODAY} by [this workflow run](${RUN_URL}). It is an automated bump using [downstream-reports/open-bump-pr](https://github.com/leanprover-community/downstream-reports)_"

          if [ -n "$MESSAGE" ]; then
            PR_BODY=$(printf '%s\n\n%s' "$MESSAGE" "$FOOTER")
          else
            PR_BODY="$FOOTER"
          fi
        fi

        # Build optional gh flag arrays.
        BASE_ARGS=()
        if [ -n "$BASE" ]; then
          BASE_ARGS=(--base "$BASE")
        fi

        LABEL_ARGS=()
        if [ -n "$LABELS" ]; then
          IFS=',' read -ra LABEL_LIST <<< "$LABELS"
          for label in "${LABEL_LIST[@]}"; do
            trimmed="${label#"${label%%[![:space:]]*}"}"  # ltrim
            trimmed="${trimmed%"${trimmed##*[![:space:]]}"}"  # rtrim
            if [ -n "$trimmed" ]; then
              LABEL_ARGS+=(--label "$trimmed")
            fi
          done
        fi

        # Check for an existing open PR on this branch.
        EXISTING=$(gh pr list \
          --head "$BRANCH" \
          --state open \
          --json number,url \
          --jq '.[0] // empty')

        if [ -n "$EXISTING" ]; then
          PR_NUMBER=$(echo "$EXISTING" | jq -r '.number')
          PR_URL=$(echo "$EXISTING" | jq -r '.url')
          gh pr edit "$PR_NUMBER" --title "$PR_TITLE" --body "$PR_BODY"
          echo "PR #${PR_NUMBER} updated: $PR_URL"
          echo "pr_action=updated" >> "$GITHUB_OUTPUT"
        else
          PR_URL=$(gh pr create \
            --head "$BRANCH" \
            "${BASE_ARGS[@]}" \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            "${LABEL_ARGS[@]}")
          PR_NUMBER="${PR_URL##*/}"
          echo "PR #${PR_NUMBER} created: $PR_URL"
          echo "pr_action=created" >> "$GITHUB_OUTPUT"
        fi

        echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
        echo "pr_url=$PR_URL"       >> "$GITHUB_OUTPUT"

    # ------------------------------------------------------------------
    # Final step: consolidate outputs.
    # ------------------------------------------------------------------
    - name: Resolve outputs
      id: resolve-outputs
      if: always()
      shell: bash
      env:
        NO_CHANGES: ${{ steps.check-changes.outputs.no_changes }}
        TREE_UNCHANGED: ${{ steps.commit-and-push.outputs.tree_unchanged }}
        EXISTING_PR_NUMBER: ${{ steps.commit-and-push.outputs.existing_pr_number }}
        EXISTING_PR_URL: ${{ steps.commit-and-push.outputs.existing_pr_url }}
        PR_NUMBER: ${{ steps.create-or-update-pr.outputs.pr_number }}
        PR_URL: ${{ steps.create-or-update-pr.outputs.pr_url }}
        PR_ACTION: ${{ steps.create-or-update-pr.outputs.pr_action }}
      run: |
        if [ "${NO_CHANGES:-}" = "true" ]; then
          echo "action=noop"   >> "$GITHUB_OUTPUT"
          echo "pr_number="    >> "$GITHUB_OUTPUT"
          echo "pr_url="       >> "$GITHUB_OUTPUT"
        elif [ "${TREE_UNCHANGED:-}" = "true" ]; then
          # Remote branch already had the same tree and an open PR — push
          # was skipped, so surface the existing PR's identity.
          echo "action=up-to-date"                  >> "$GITHUB_OUTPUT"
          echo "pr_number=${EXISTING_PR_NUMBER:-}"  >> "$GITHUB_OUTPUT"
          echo "pr_url=${EXISTING_PR_URL:-}"        >> "$GITHUB_OUTPUT"
        else
          echo "action=${PR_ACTION:-created}"  >> "$GITHUB_OUTPUT"
          echo "pr_number=${PR_NUMBER:-}"      >> "$GITHUB_OUTPUT"
          echo "pr_url=${PR_URL:-}"            >> "$GITHUB_OUTPUT"
        fi
