name: 'Bump to Latest'
description: >
  Look up the target commit (last-known-good or first-known-bad) for a
  downstream and bump the mathlib dependency to it via hopscotch. On success
  the working tree contains modified lakefile and lake-manifest.json ready
  to commit.

inputs:
  downstream:
    required: false
    default: ${{ github.repository }}
    description: >
      Downstream to look up. May be a registered downstream name (e.g. "physlib")
      or a GitHub repo slug (e.g. "leanprover-community/physlib"). When the value
      contains a "/" it is treated as a repo slug; otherwise as a name key.
      Defaults to the repository running this action.
  project-dir:
    required: false
    default: '.'
    description: 'Path to the downstream project root (default: repo root)'
  dependency-name:
    required: false
    default: 'mathlib'
    description: 'Name of the dependency in the lakefile'
  hopscotch-version:
    required: false
    default: 'v2.0.0'
    description: >
      Hopscotch release tag to download. v2.0.0+ is required for the `fix`
      subcommand (used by apply-fixes); on older tags the apply step finds no
      `fix` subcommand and degrades to a rev-bump-only PR.
  skip-build:
    required: false
    default: false
    description: >
      Set to "true" to skip the build step and only update the dependency pin
      in the lakefile and lake-manifest.json via "lake update". When true,
      build-failed is always false; the bump succeeds as long as "lake update"
      succeeds.
  generate-description:
    required: false
    default: 'true'
    description: >
      Set to "false" to skip fetching commit descriptions from the GitHub API.
      When false, pr-title, bump-description, and commit-message outputs are empty.
  query-type:
    required: false
    default: 'last-known-good'
    description: >
      Which commit to bump to. One of:
        last-known-good  (default) — the last commit known to build successfully
        first-known-bad            — the first commit known to break the build
                                     (null when no active regression)
        last-good-release          — the latest semver release tag (e.g. v4.13.0)
                                     reachable from the last-known-good commit
  branch:
    required: false
    default: 'hopscotch/lkg-bump'
    description: >
      Bump-PR branch the Step 1.5 probe checks for an already-applied bump.
      Must match the `branch` passed to open-bump-pr; otherwise the probe
      watches the wrong branch and the bump rebuilds on every run. Unused for
      query-type=first-known-bad (the probe is disabled there). Defaults to
      open-bump-pr's own default.
  apply-fixes:
    required: false
    default: 'true'
    description: >
      After the bump, run `hopscotch fix apply` so the PR carries the import
      repairs hopscotch recorded, not just the rev bump. Like the tool's own
      default, this applies BOTH the failure-boundary `proposedFixes` (for an
      FKB bump, overlaid from the regression probe's published wide-range
      bisection) AND deprecated-import advisories (imports routing through a live
      `deprecated_module` shim that breaks at the upstream cleanup). Runs on any
      query-type. Set `no-advisories` to restrict it to the boundary repairs.
      Best-effort: if no fixes were recorded, the installed hopscotch lacks the
      `fix` subcommand, or the apply fails, the bump PR opens with the rev bump
      alone. The applied rewrites are validated by the PR's own CI.
  no-advisories:
    required: false
    default: 'false'
    description: >
      Pass `--no-advisories` to `hopscotch fix apply`, restricting it to the
      boundary-repairing `proposedFixes` and skipping deprecated-import
      advisories (mirrors hopscotch's own flag; advisories apply by default).
      Set this for an LKG bump you want to keep "mergeable as-is": advisory
      rewrites are not covered by the bump's green build, so suppressing them
      preserves that property. (Advisories are read from the bump's own
      results.json — detected at the commit just bumped to — so they are
      complete only when that bump built; under skip-build only the
      tree-resolved subset is found.) No effect when `apply-fixes` is false.

outputs:
  rev:
    description: 'The human-readable ref passed to hopscotch (a tag name for last-good-release, or for a last-known-good bump that lands exactly on a release tag; a SHA otherwise)'
    value: ${{ steps.resolve-outputs.outputs.rev }}
  commit:
    description: 'The resolved commit SHA (always a SHA)'
    value: ${{ steps.resolve-outputs.outputs.commit }}
  current-pin:
    description: 'The commit the project was pinned to before this action ran'
    value: ${{ steps.resolve-outputs.outputs.current_pin }}
  updated:
    description: '"true" if hopscotch successfully bumped the project'
    value: ${{ steps.resolve-outputs.outputs.updated }}
  skipped:
    description: >
      "true" if no bump was performed — because the project's manifest is
      already at the target commit, because an open bump PR's branch already
      pins the dependency at it (Step 1.5 probe), or (query-type=last-good-release
      only) because the latest release tag is behind or diverged from the
      current pin. When "true", the working tree is unmodified.
    value: ${{ steps.resolve-outputs.outputs.skipped }}
  build-failed:
    description: '"true" if hopscotch ran but the build failed'
    value: ${{ steps.resolve-outputs.outputs.build_failed }}
  pr-title:
    description: 'Suggested PR title for the bump (empty when skipped)'
    value: ${{ steps.fetch-descriptions.outputs.pr_title }}
  bump-description:
    description: >
      Markdown paragraph describing the bump (new commit + previous pin,
      with subjects and dates). Pass to open-bump-pr message input.
      Empty when skipped.
    value: ${{ steps.fetch-descriptions.outputs.bump_description }}
  commit-message:
    description: 'Suggested git commit message for the bump (empty when skipped)'
    value: ${{ steps.fetch-descriptions.outputs.commit_message }}
  fix-summary:
    description: >
      hopscotch's own `fix apply` output, verbatim, when it rewrote imports
      after the bump — empty when nothing was applied, the step was skipped, or
      no fixes were recorded. Surface this in a PR body to describe the applied
      migrations using the tool's own words rather than a synthesized count.
    value: ${{ steps.apply-fixes.outputs.fix_summary }}

runs:
  using: 'composite'
  steps:
    # ------------------------------------------------------------------
    # Step 1: Look up the target commit for this downstream.
    # Fails fast with a helpful error if the downstream is not found.
    # ------------------------------------------------------------------
    - name: Look up target commit
      id: fetch-snapshot
      shell: bash
      env:
        DOWNSTREAM: ${{ inputs.downstream }}
        QUERY_TYPE: ${{ inputs.query-type }}
      run: bash "${{ github.action_path }}/../../scripts/fetch-latest.sh"

    # ------------------------------------------------------------------
    # Step 1.2: When the target commit is exactly a release tag, relabel the
    # rev to the tag name. hopscotch then pins the tag (manifest inputRev =
    # the tag, rev = the resolved SHA, so it stays reproducible) and the PR
    # shows the release name. Detected for free from the snapshot: the target
    # lands on the release exactly when it equals last_good_release_commit.
    # A last-good-release bump already carries a tag rev, so it is left as-is.
    # ------------------------------------------------------------------
    - name: Relabel target as a release tag when it lands on one
      id: relabel
      shell: bash
      env:
        RAW_REV: ${{ steps.fetch-snapshot.outputs.rev }}
        RAW_COMMIT: ${{ steps.fetch-snapshot.outputs.commit }}
        RELEASE_TAG: ${{ steps.fetch-snapshot.outputs.release_tag }}
        RELEASE_COMMIT: ${{ steps.fetch-snapshot.outputs.release_commit }}
      run: |
        set -euo pipefail
        EFF_REV="$RAW_REV"
        if [ "$RAW_REV" = "$RAW_COMMIT" ] && [ -n "$RELEASE_TAG" ] \
            && [ "$RAW_COMMIT" = "$RELEASE_COMMIT" ]; then
          echo "Target ${RAW_COMMIT} is release ${RELEASE_TAG}; pinning the tag name."
          EFF_REV="$RELEASE_TAG"
        fi
        echo "rev=$EFF_REV" >> "$GITHUB_OUTPUT"

    # ------------------------------------------------------------------
    # Step 1.5: If an open PR on the LKG bump branch already pins the
    # dependency at the target, short-circuit the bump (Compare pins
    # below). Avoids redundant lake builds on sub-daily reruns while a
    # bump PR awaits merge.
    #
    # Skipped for query-type=first-known-bad — FKB lives on per-SHA
    # branches handled by track-incompatibility, and probing the LKG
    # branch against an FKB target could spuriously match a leftover
    # branch and suppress a real fix PR.
    #
    # Any failure (no open PR, 404, malformed manifest, etc.) falls
    # through to no-match so the bump runs — better to spend a build
    # than silently skip a legitimate one.
    # ------------------------------------------------------------------
    - name: Probe bump-PR branch for an existing bump
      id: probe-ref
      if: >-
        inputs.query-type != 'first-known-bad'
        && steps.fetch-snapshot.outputs.commit != ''
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        # Bump-PR branch to probe. Override via the `branch` input to keep it
        # in sync with open-bump-pr (e.g. a release-tag bump on `hopscotch/tag-bump`).
        REF: ${{ inputs.branch }}
        TARGET_COMMIT: ${{ steps.fetch-snapshot.outputs.commit }}
        DEPENDENCY_NAME: ${{ inputs.dependency-name }}
        PROJECT_DIR: ${{ inputs.project-dir }}
      run: |
        set -euo pipefail

        if [ -z "$PROJECT_DIR" ] || [ "$PROJECT_DIR" = "." ]; then
          MANIFEST_PATH="lake-manifest.json"
        else
          rel="${PROJECT_DIR#./}"
          MANIFEST_PATH="${rel%/}/lake-manifest.json"
        fi

        emit_no_match() {
          echo "match=false" >> "$GITHUB_OUTPUT"
        }

        # Gate on open PR. A leftover branch (auto-delete-on-merge isn't
        # always on) could pin the target without surfacing it as a PR;
        # gating only on the manifest would silently skip in that case.
        pr_err=$(mktemp)
        if open_pr=$(gh pr list \
            --head "${REF}" --state open \
            --json number --jq '.[0].number // empty' 2>"$pr_err"); then
          rm -f "$pr_err"
        else
          err=$(cat "$pr_err" 2>/dev/null || true)
          rm -f "$pr_err"
          echo "::warning::Failed to list open PRs on '${REF}': ${err}"
          emit_no_match
          exit 0
        fi
        if [ -z "$open_pr" ]; then
          echo "No open PR on '${REF}' — running bump."
          emit_no_match
          exit 0
        fi

        # `// empty` collapses null .content to an empty string.
        api_err=$(mktemp)
        if encoded=$(gh api \
            "repos/${GITHUB_REPOSITORY}/contents/${MANIFEST_PATH}?ref=${REF}" \
            --jq '.content // empty' 2>"$api_err"); then
          rm -f "$api_err"
        else
          err=$(cat "$api_err" 2>/dev/null || true)
          rm -f "$api_err"
          if printf '%s' "$err" | grep -q -i 'not found\|404'; then
            echo "Branch '${REF}' has no '${MANIFEST_PATH}' (404 — unexpected after PR check)."
          else
            echo "::warning::Probe of '${REF}:${MANIFEST_PATH}' failed: ${err}"
          fi
          emit_no_match
          exit 0
        fi

        if [ -z "$encoded" ]; then
          echo "::warning::Probe of '${REF}:${MANIFEST_PATH}' returned no .content."
          emit_no_match
          exit 0
        fi

        # Decode and parse split so each can fail independently to
        # no-match (without this, set -e / pipefail would crash on
        # non-base64 input or non-JSON payload).
        if ! manifest=$(printf '%s' "$encoded" | base64 -d 2>/dev/null); then
          echo "::warning::Failed to base64-decode '${REF}:${MANIFEST_PATH}'."
          emit_no_match
          exit 0
        fi

        # `[]?` and `// empty` swallow unexpected schema shapes.
        if ! ref_pin=$(printf '%s' "$manifest" | jq -r --arg dep "$DEPENDENCY_NAME" \
            '.packages[]? | select(.name == $dep) | .rev // empty' 2>/dev/null); then
          echo "::warning::Failed to parse '${REF}:${MANIFEST_PATH}' as JSON."
          emit_no_match
          exit 0
        fi

        if [ -z "$ref_pin" ]; then
          echo "'${DEPENDENCY_NAME}' not present in '${REF}:${MANIFEST_PATH}'."
          emit_no_match
          exit 0
        fi

        echo "Branch '${REF}' pins '${DEPENDENCY_NAME}' at ${ref_pin} (target ${TARGET_COMMIT})."
        if [ "$ref_pin" = "$TARGET_COMMIT" ]; then
          echo "match=true"  >> "$GITHUB_OUTPUT"
        else
          echo "match=false" >> "$GITHUB_OUTPUT"
        fi

    # ------------------------------------------------------------------
    # Step 2: Read the current mathlib pin from lake-manifest.json.
    # ------------------------------------------------------------------
    - name: Read current pin from lake-manifest.json
      id: read-manifest
      shell: bash
      env:
        PROJECT_DIR: ${{ inputs.project-dir }}
        DEPENDENCY_NAME: ${{ inputs.dependency-name }}
      run: |
        set -euo pipefail

        MANIFEST="$PROJECT_DIR/lake-manifest.json"
        if [ ! -f "$MANIFEST" ]; then
          echo "Error: $MANIFEST not found in project-dir '$PROJECT_DIR'."
          exit 1
        fi

        CURRENT_PIN=$(jq -r --arg dep "$DEPENDENCY_NAME" \
          '.packages[] | select(.name == $dep) | .rev' \
          "$MANIFEST")

        if [ -z "$CURRENT_PIN" ]; then
          echo "Error: dependency '$DEPENDENCY_NAME' not found in $MANIFEST."
          echo "Packages present:"
          jq -r '.packages[].name' "$MANIFEST"
          exit 1
        fi

        echo "Current pin for '$DEPENDENCY_NAME': $CURRENT_PIN"
        echo "current_pin=$CURRENT_PIN" >> "$GITHUB_OUTPUT"

    # ------------------------------------------------------------------
    # Step 3: Compare pins. Skip the build steps when the bump is already
    # done — either because project-dir's manifest is at the target, or
    # because the bump-PR branch's manifest is (per the step 1.5 probe).
    # ------------------------------------------------------------------
    - name: Compare pins
      id: compare
      shell: bash
      env:
        TARGET_REV: ${{ steps.relabel.outputs.rev }}
        TARGET_COMMIT: ${{ steps.fetch-snapshot.outputs.commit }}
        CURRENT_PIN: ${{ steps.read-manifest.outputs.current_pin }}
        REF_MATCH: ${{ steps.probe-ref.outputs.match }}
      run: |
        # Use TARGET_COMMIT (SHA) for the equality check so that tag names
        # compare correctly against the SHA stored in lake-manifest.json.
        if [ -z "$TARGET_REV" ]; then
          echo "Target commit is empty (no active entry for this query-type) — nothing to do."
          echo "skipped=true" >> "$GITHUB_OUTPUT"
        elif [ "${REF_MATCH:-}" = "true" ]; then
          echo "Bump-PR branch already pins the dependency at target $TARGET_REV — nothing to do."
          echo "skipped=true" >> "$GITHUB_OUTPUT"
        elif [ "$CURRENT_PIN" = "$TARGET_COMMIT" ]; then
          echo "Already at target $TARGET_REV — nothing to do."
          echo "skipped=true" >> "$GITHUB_OUTPUT"
        else
          echo "Pin needs update: $CURRENT_PIN → $TARGET_REV"
          echo "skipped=false" >> "$GITHUB_OUTPUT"
        fi

    # ------------------------------------------------------------------
    # Step 3.4: Resolve the upstream repo slug used by the guardrail and the
    # commit-description lookups. The snapshot publishes the authoritative
    # `upstream` — the repo the recorded commits actually live in — so there
    # is nothing to configure. The hardcoded fallback is only reached on a
    # snapshot that predates the `upstream` field.
    # ------------------------------------------------------------------
    - name: Resolve upstream repo
      id: resolve-upstream
      if: steps.compare.outputs.skipped != 'true'
      shell: bash
      env:
        SNAPSHOT_UPSTREAM: ${{ steps.fetch-snapshot.outputs.upstream }}
      run: |
        set -euo pipefail
        if [ -n "$SNAPSHOT_UPSTREAM" ]; then
          EFFECTIVE="$SNAPSHOT_UPSTREAM"
          echo "Using upstream published in the snapshot: $EFFECTIVE"
        else
          EFFECTIVE="leanprover-community/mathlib4"
          echo "::warning::Snapshot has no 'upstream' field; falling back to $EFFECTIVE."
        fi
        echo "effective=$EFFECTIVE" >> "$GITHUB_OUTPUT"

    # ------------------------------------------------------------------
    # Step 3.5: Guardrail — refuse to move the pin backwards.
    #
    # The published snapshot can lag a downstream's own manifest: the
    # project may have already advanced its dependency pin past the commit
    # recorded in the snapshot. Bumping to the snapshot's target in that
    # case would rewind the pin to an older upstream commit, which is never
    # what we want. Ask the upstream repo's compare API how the target
    # relates to the current pin and refuse unless it moves forward:
    #
    #   status=ahead     → target is a descendant of the pin (forward) — OK
    #   status=identical → same commit (compare step would have skipped)
    #   status=behind    → target is an ancestor of the pin (backward)
    #   status=diverged  → neither is an ancestor of the other
    #
    # How a non-forward target (behind/diverged) is handled depends on the
    # query-type, because the *meaning* differs:
    #
    #   * last-known-good / first-known-bad → HARD FAIL. Snapshot older than
    #     the project's pin is a genuine anomaly worth surfacing.
    #   * last-good-release → SKIP (skipped=true, exit 0). A release tag
    #     behind the pin means the project is already past the latest release.
    #     This is the normal state once a latest-commit bump has been merged.
    #
    # A failed or inconclusive API call is a warning, not a hard stop: the
    # guardrail is a safety net, and a transient API error shouldn't block
    # an otherwise-legitimate bump (a genuinely-missing target commit is
    # caught by hopscotch itself further down).
    # ------------------------------------------------------------------
    - name: Guard against a backwards pin move
      id: guard
      if: steps.compare.outputs.skipped != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        UPSTREAM: ${{ steps.resolve-upstream.outputs.effective }}
        CURRENT_PIN: ${{ steps.read-manifest.outputs.current_pin }}
        TARGET_COMMIT: ${{ steps.fetch-snapshot.outputs.commit }}
        TARGET_REV: ${{ steps.relabel.outputs.rev }}
        QUERY_TYPE: ${{ inputs.query-type }}
      run: |
        set -euo pipefail

        echo "Checking that target ${TARGET_REV} (${TARGET_COMMIT}) is not behind the current pin ${CURRENT_PIN} in ${UPSTREAM}..."

        api_err=$(mktemp)
        if status=$(gh api \
            "repos/${UPSTREAM}/compare/${CURRENT_PIN}...${TARGET_COMMIT}" \
            --jq '.status' 2>"$api_err"); then
          rm -f "$api_err"
        else
          err=$(cat "$api_err" 2>/dev/null || true)
          rm -f "$api_err"
          echo "::warning::Could not compare ${CURRENT_PIN}...${TARGET_COMMIT} in ${UPSTREAM}: ${err}"
          echo "::warning::Skipping the backwards-move guardrail for this run; proceeding with the bump."
          exit 0
        fi

        case "$status" in
          ahead|identical)
            echo "Target is '${status}' relative to the current pin — safe to proceed."
            ;;
          behind)
            if [ "$QUERY_TYPE" = "last-good-release" ]; then
              echo "Latest release tag ${TARGET_REV} (${TARGET_COMMIT}) is behind the current pin ${CURRENT_PIN} in ${UPSTREAM} — the project is already past it. Nothing to do."
              echo "skipped=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::Refusing to bump: target ${TARGET_REV} (${TARGET_COMMIT}) is BEHIND the current pin ${CURRENT_PIN} in ${UPSTREAM}."
            echo "::error::The published snapshot is older than this project's current dependency pin; bumping would move the pin backwards. No change has been made."
            exit 1
            ;;
          diverged)
            if [ "$QUERY_TYPE" = "last-good-release" ]; then
              echo "::warning::Latest release tag ${TARGET_REV} (${TARGET_COMMIT}) has DIVERGED from the current pin ${CURRENT_PIN} in ${UPSTREAM} (neither is an ancestor of the other) — not a forward move. Nothing to do."
              echo "skipped=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::Refusing to bump: target ${TARGET_REV} (${TARGET_COMMIT}) and the current pin ${CURRENT_PIN} have DIVERGED in ${UPSTREAM} (neither is an ancestor of the other). No change has been made."
            exit 1
            ;;
          *)
            echo "::warning::Unexpected compare status '${status}' for ${CURRENT_PIN}...${TARGET_COMMIT} in ${UPSTREAM}; proceeding with the bump."
            ;;
        esac

    # ------------------------------------------------------------------
    # Step 4: Fetch one-line commit descriptions for the target commit and
    # the current pin, and compose the PR title, body snippet, and git
    # commit message. Runs whenever a bump is needed; outputs are empty
    # when the project is already at the target commit (skipped=true).
    # ------------------------------------------------------------------
    - name: Fetch commit descriptions
      id: fetch-descriptions
      if: steps.compare.outputs.skipped != 'true' && steps.guard.outputs.skipped != 'true' && inputs.generate-description != 'false'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        TARGET_COMMIT: ${{ steps.relabel.outputs.rev }}
        TARGET_SHA: ${{ steps.fetch-snapshot.outputs.commit }}
        CURRENT_PIN: ${{ steps.read-manifest.outputs.current_pin }}
        DEPENDENCY_NAME: ${{ inputs.dependency-name }}
        DEPENDENCY_REPO: ${{ steps.resolve-upstream.outputs.effective }}
      run: |
        set -euo pipefail

        fetch_info() {
          local sha="$1"
          # Returns <subject>\t<committer-date YYYY-MM-DD>, or empty on failure.
          gh api "repos/${DEPENDENCY_REPO}/commits/${sha}" \
            --jq '[(.commit.message | split("\n")[0]), .commit.committer.date[:10]] | join("\t")' \
            2>/dev/null || true
        }

        suffix() {
          local subject="$1" date="$2" result=""
          [ -n "$subject" ] && result="${result}: ${subject}"
          [ -n "$date" ]    && result="${result} (${date})"
          printf '%s' "$result"
        }

        TARGET_INFO=$(fetch_info "$TARGET_COMMIT")
        TARGET_SUBJECT=$(printf '%s' "$TARGET_INFO" | cut -f1)
        TARGET_DATE=$(printf '%s' "$TARGET_INFO" | cut -f2)

        PREV_INFO=$(fetch_info "$CURRENT_PIN")
        PREV_SUBJECT=$(printf '%s' "$PREV_INFO" | cut -f1)
        PREV_DATE=$(printf '%s' "$PREV_INFO" | cut -f2)

        # For last-good-release, show the tag name in full (truncating
        # "v4.32.0-rc1" to 7 chars would drop the prerelease). Otherwise
        # abbreviate the SHA to 7 chars.
        if [ -n "$TARGET_SHA" ] && [ "$TARGET_COMMIT" != "$TARGET_SHA" ]; then
          TARGET_LABEL="$TARGET_COMMIT"
        else
          TARGET_LABEL="${TARGET_COMMIT:0:7}"
        fi
        PREV_SHORT="${CURRENT_PIN:0:7}"
        # For last-good-release, link to the resolved SHA (not the tag).
        TARGET_URL="https://github.com/${DEPENDENCY_REPO}/commit/${TARGET_SHA:-$TARGET_COMMIT}"
        PREV_URL="https://github.com/${DEPENDENCY_REPO}/commit/${CURRENT_PIN}"

        TARGET_SUFFIX=$(suffix "$TARGET_SUBJECT" "$TARGET_DATE")
        PREV_SUFFIX=$(suffix "$PREV_SUBJECT" "$PREV_DATE")

        PR_TITLE="Bump \`${DEPENDENCY_NAME}\` dependency to ${TARGET_LABEL}"
        COMMIT_MSG="chore: bump ${DEPENDENCY_NAME} to ${TARGET_LABEL}${TARGET_SUFFIX}"

        {
          echo "pr_title=${PR_TITLE}"
          echo "commit_message=${COMMIT_MSG}"
          echo "bump_description<<BUMP_EOF"
          printf 'Bump `%s` dependency to [%s](%s)%s\n' \
            "$DEPENDENCY_NAME" "$TARGET_LABEL" "$TARGET_URL" "$TARGET_SUFFIX"
          printf 'Previously at: [%s](%s)%s\n' \
            "$PREV_SHORT" "$PREV_URL" "$PREV_SUFFIX"
          # When the target is a tag (rev != SHA), note it pins a named release.
          if [ "$TARGET_COMMIT" != "$TARGET_SHA" ]; then
            printf '\nThis pins the named release `%s`.\n' "$TARGET_LABEL"
          fi
          echo "BUMP_EOF"
        } >> "$GITHUB_OUTPUT"

    # ------------------------------------------------------------------
    # Steps 5–7 only run when an update is needed.
    # ------------------------------------------------------------------

    - name: Install Lean (elan)
      if: steps.compare.outputs.skipped != 'true' && steps.guard.outputs.skipped != 'true'
      shell: bash
      run: |
        curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
          -sSf | sh -s -- -y --default-toolchain none
        echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

    - name: Download hopscotch binary
      if: steps.compare.outputs.skipped != 'true' && steps.guard.outputs.skipped != 'true'
      shell: bash
      env:
        HOPSCOTCH_VERSION: ${{ inputs.hopscotch-version }}
      run: |
        set -euo pipefail
        TOOL_DIR="$RUNNER_TEMP/hopscotch-bin"
        mkdir -p "$TOOL_DIR"
        curl -L \
          "https://github.com/leanprover-community/hopscotch/releases/download/${HOPSCOTCH_VERSION}/hopscotch-linux-x86_64" \
          -o "$TOOL_DIR/hopscotch"
        chmod +x "$TOOL_DIR/hopscotch"
        echo "$TOOL_DIR" >> "$GITHUB_PATH"

    - name: Clean any stale hopscotch session
      if: steps.compare.outputs.skipped != 'true' && steps.guard.outputs.skipped != 'true'
      shell: bash
      env:
        PROJECT_DIR: ${{ inputs.project-dir }}
      run: |
        # Ignore errors — clean is a best-effort guard against leftover state.
        hopscotch clean --project-dir "$PROJECT_DIR" || true

    # ------------------------------------------------------------------
    # Step 7: Run hopscotch to bump and build.
    #
    # Exit codes (process and results.json `exitCode` agree on 0/1):
    #   0 → bumped successfully (lakefile + manifest updated; built too
    #       unless skip-build)
    #   1 → a stage failed (results.json `status = stopped`). The *only*
    #       acceptable exit-1 is a first-known-bad bump (no --keep-last-good,
    #       no skip-build) whose `failureStage` is "lake build" — the FKB
    #       breaks the verify step by definition, so a built-out FKB tree is
    #       what we want. A "lake update" failure (the bump step, e.g. a flaky
    #       "failed to parse latest release tag") leaves the lakefile rewritten
    #       but lake-manifest.json stale, so it must fail the step.
    #   2+ → tool error, aborted before any state transition (fail the step).
    #
    # We classify on the documented `failureStage` enum from results.json
    # (see hopscotch docs/results.schema.json, schemaVersion 1) rather than
    # the bare exit code, which can't tell a build failure from a bump failure.
    # ------------------------------------------------------------------
    - name: Run hopscotch dep
      id: run-hopscotch
      if: steps.compare.outputs.skipped != 'true' && steps.guard.outputs.skipped != 'true'
      shell: bash
      env:
        DEPENDENCY_NAME: ${{ inputs.dependency-name }}
        CURRENT_PIN: ${{ steps.read-manifest.outputs.current_pin }}
        TARGET_COMMIT: ${{ steps.relabel.outputs.rev }}
        PROJECT_DIR: ${{ inputs.project-dir }}
        GITHUB_TOKEN: ${{ github.token }}
        HOPSCOTCH_SKIP_BUILD: ${{ inputs.skip-build }}
        KEEP_LAST_GOOD: ${{ inputs.query-type != 'first-known-bad' }}
      run: |
        set +e

        RESULTS_JSON="$RUNNER_TEMP/bump-results.json"
        rm -f "$RESULTS_JSON"

        ARGS=(
          dep "$DEPENDENCY_NAME"
          --from "${TARGET_COMMIT}~1"
          --to "$TARGET_COMMIT"
          --project-dir "$PROJECT_DIR"
          --scan-mode linear
          --allow-dirty-workspace
          --results-json "$RESULTS_JSON"
        )

        # Only pass the flag if enabled
        if [ "$KEEP_LAST_GOOD" = "true" ]; then
          ARGS+=(--keep-last-good)
        fi

        hopscotch "${ARGS[@]}"
        EXIT_CODE=$?

        set -e

        # Read the documented failure stage hopscotch reported. Empty when the
        # run succeeded or no results file was written (e.g. an early abort).
        FAILURE_STAGE=""
        if [ -f "$RESULTS_JSON" ]; then
          FAILURE_STAGE=$(jq -r '.failureStage // empty' "$RESULTS_JSON" 2>/dev/null || true)
        fi

        if [ "$EXIT_CODE" -eq 0 ]; then
          echo "hopscotch: bump succeeded."
          echo "updated=true" >> "$GITHUB_OUTPUT"
          echo "build_failed=false" >> "$GITHUB_OUTPUT"

        elif [ "$EXIT_CODE" -eq 1 ] \
            && [ "$KEEP_LAST_GOOD" != "true" ] \
            && [ "$HOPSCOTCH_SKIP_BUILD" != "true" ] \
            && [ "$FAILURE_STAGE" = "lake build" ]; then
          # First-known-bad bump with a build: `lake update` succeeded and the
          # verify step (`lake build`) failed — the expected outcome, since the
          # FKB breaks the build by definition. The bumped tree (lakefile +
          # manifest at the FKB) is what we want to commit.
          echo "hopscotch: build failed but expected (FKB breaks the build)."
          echo "updated=true" >> "$GITHUB_OUTPUT"
          echo "build_failed=true" >> "$GITHUB_OUTPUT"

        elif [ "$EXIT_CODE" -eq 1 ]; then
          # Any other stopped state is unexpected or leaves an inconsistent tree:
          # a "lake update" failure (bump step — manifest never regenerated, so
          # the lakefile and lake-manifest.json disagree), an LKG that failed to
          # build, or a git-cleanliness stop. Fail so callers never commit a
          # half-baked bump.
          echo "hopscotch: stopped at stage '${FAILURE_STAGE:-unknown}' (exit 1) — not a committable bump."
          echo "updated=false" >> "$GITHUB_OUTPUT"
          echo "build_failed=false" >> "$GITHUB_OUTPUT"
          exit "$EXIT_CODE"

        else
          echo "hopscotch: tool error (exit $EXIT_CODE)."
          exit "$EXIT_CODE"
        fi
    # ------------------------------------------------------------------
    # Steps 8–9: apply the import fixes hopscotch recorded (when apply-fixes).
    # Runs `hopscotch fix apply`, which — like the tool's own default —
    # applies both kinds, unless no-advisories restricts it to the first:
    #   * proposed_fixes (the failure-boundary repairs). For an FKB bump these
    #     come from the regression probe's full LKG→HEAD bisection (robust,
    #     offline) — fetched here and overlaid onto the bump's own results.json
    #     rather than trusting this narrow re-bump's own detection.
    #   * advisories (deprecated-but-working imports). Read straight from the
    #     bump's own results.json (detected at the commit just bumped to), so no
    #     fetch is needed; suppressed by no-advisories.
    #
    # The whole pass is best-effort: any miss (nothing recorded, a hopscotch
    # without the `fix` subcommand, a failed apply) leaves the rev-bumped tree
    # untouched, so the bump PR still opens — just without the rewrites.  The
    # PR's CI is what validates them.
    # ------------------------------------------------------------------
    - name: Fetch published fixes
      id: fetch-fixes
      if: >-
        steps.compare.outputs.skipped != 'true'
        && steps.guard.outputs.skipped != 'true'
        && steps.run-hopscotch.outputs.updated == 'true'
        && inputs.query-type == 'first-known-bad'
        && inputs.apply-fixes == 'true'
      shell: bash
      env:
        DOWNSTREAM: ${{ inputs.downstream }}
      run: bash "${{ github.action_path }}/../../scripts/fetch-run-latest.sh"

    - name: Apply automated fixes
      id: apply-fixes
      if: >-
        steps.compare.outputs.skipped != 'true'
        && steps.guard.outputs.skipped != 'true'
        && steps.run-hopscotch.outputs.updated == 'true'
        && inputs.apply-fixes == 'true'
      shell: bash
      env:
        PROJECT_DIR: ${{ inputs.project-dir }}
        # Empty when the fetch step was skipped (non-FKB bump): only an FKB bump
        # overlays published proposedFixes; otherwise the scaffold is used as-is.
        PUBLISHED_FIXES: ${{ steps.fetch-fixes.outputs.proposed_fixes_file }}
        NO_ADVISORIES: ${{ inputs.no-advisories }}
      run: |
        set +e
        SCAFFOLD="$RUNNER_TEMP/bump-results.json"
        MERGED="$RUNNER_TEMP/hopscotch-fix-input.json"
        LOG="$RUNNER_TEMP/hopscotch-fix-apply.log"
        # hopscotch's own one-line apply summary, surfaced verbatim to the PR
        # body.  We never synthesize a count or sentence — the tool reports what
        # it did.  Empty unless hopscotch actually rewrote files.
        FIX_SUMMARY=""

        # hopscotch's `fix apply` migrates deprecated-import advisories by
        # default; pass --no-advisories only when the caller opted out.
        # (Boundary proposedFixes apply regardless of this flag.)
        FLAGS=()
        if [ "$NO_ADVISORIES" = "true" ]; then
          FLAGS+=(--no-advisories)
        fi

        if ! command -v hopscotch >/dev/null 2>&1; then
          echo "::warning::hopscotch not on PATH; opening the bump PR without import rewrites"
        elif [ ! -f "$SCAFFOLD" ]; then
          echo "::warning::no results.json scaffold from the bump; skipping fix apply"
        else
          # The scaffold is the bump's own results.json — it carries every field
          # `hopscotch fix --from` requires for the installed binary, plus the
          # advisories detected at the bumped-to commit.  For an FKB bump, overlay
          # the published (wide-range) proposed fixes onto it; otherwise use it
          # as-is (advisories come from the scaffold).
          if [ -n "${PUBLISHED_FIXES:-}" ] && [ -s "$PUBLISHED_FIXES" ] \
              && [ "$(jq 'length' "$PUBLISHED_FIXES" 2>/dev/null || echo 0)" -gt 0 ]; then
            if ! jq --slurpfile pub "$PUBLISHED_FIXES" '.proposedFixes = $pub[0]' "$SCAFFOLD" > "$MERGED" 2>/dev/null; then
              echo "::warning::could not build the fix input from $SCAFFOLD; skipping fix apply"
              MERGED=""
            fi
          else
            cp "$SCAFFOLD" "$MERGED"
          fi

          if [ -n "$MERGED" ] && [ -f "$MERGED" ]; then
            # Let hopscotch decide what applies and report it.  Capture its
            # output verbatim.
            hopscotch fix apply --from "$MERGED" --project-dir "$PROJECT_DIR" "${FLAGS[@]}" 2>&1 | tee "$LOG"
            rc=${PIPESTATUS[0]}
            if [ "$rc" -ne 0 ]; then
              echo "::warning::hopscotch fix apply failed; opening the bump PR without import rewrites"
            elif grep -q "No applicable automated fixes" "$LOG" || grep -q "rewrote 0 file(s)" "$LOG"; then
              # hopscotch's own phrasings for "nothing changed" — don't surface a line.
              echo "hopscotch fix apply made no changes."
            else
              FIX_SUMMARY=$(cat "$LOG")
            fi
          fi
        fi

        {
          echo "fix_summary<<__HOPSCOTCH_EOF__"
          printf '%s\n' "$FIX_SUMMARY"
          echo "__HOPSCOTCH_EOF__"
        } >> "$GITHUB_OUTPUT"
        set -e

    # ------------------------------------------------------------------
    # Final step: consolidate outputs with safe defaults so callers never
    # see empty strings for boolean-valued outputs.
    # ------------------------------------------------------------------
    - name: Resolve outputs
      id: resolve-outputs
      if: always()
      shell: bash
      env:
        TARGET_REV: ${{ steps.relabel.outputs.rev }}
        TARGET_COMMIT: ${{ steps.fetch-snapshot.outputs.commit }}
        CURRENT_PIN: ${{ steps.read-manifest.outputs.current_pin }}
        SKIPPED: ${{ steps.compare.outputs.skipped }}
        GUARD_SKIPPED: ${{ steps.guard.outputs.skipped }}
        UPDATED: ${{ steps.run-hopscotch.outputs.updated }}
        BUILD_FAILED: ${{ steps.run-hopscotch.outputs.build_failed }}
      run: |
        # Combine compare and guard skips: skip if either step says skip.
        if [ "${SKIPPED:-}" = "true" ] || [ "${GUARD_SKIPPED:-}" = "true" ]; then
          SKIPPED=true
        else
          SKIPPED=false
        fi
        echo "rev=${TARGET_REV:-}"                 >> "$GITHUB_OUTPUT"
        echo "commit=${TARGET_COMMIT:-}"           >> "$GITHUB_OUTPUT"
        echo "current_pin=${CURRENT_PIN:-}"        >> "$GITHUB_OUTPUT"
        echo "skipped=${SKIPPED}"                  >> "$GITHUB_OUTPUT"
        echo "updated=${UPDATED:-false}"           >> "$GITHUB_OUTPUT"
        echo "build_failed=${BUILD_FAILED:-false}" >> "$GITHUB_OUTPUT"
