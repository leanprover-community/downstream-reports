name: 'Bump to Latest'
description: >
  Look up the target commit (last-known-good or first-known-bad) for a
  downstream and bump the mathlib dependency to it via hopscotch. On success
  the working tree contains modified lakefile and lake-manifest.json ready
  to commit.

inputs:
  downstream:
    required: false
    default: ${{ github.repository }}
    description: >
      Downstream to look up. May be a registered downstream name (e.g. "physlib")
      or a GitHub repo slug (e.g. "leanprover-community/physlib"). When the value
      contains a "/" it is treated as a repo slug; otherwise as a name key.
      Defaults to the repository running this action.
  project-dir:
    required: false
    default: '.'
    description: 'Path to the downstream project root (default: repo root)'
  dependency-name:
    required: false
    default: 'mathlib'
    description: 'Name of the dependency in the lakefile'
  hopscotch-version:
    required: false
    default: 'v1.4.1'
    description: 'Hopscotch release tag to download'
  skip-build:
    required: false
    default: false
    description: >
      Set to "true" to skip the build step and only update the dependency pin
      in the lakefile and lake-manifest.json via "lake update". When true,
      build-failed is always false; the bump succeeds as long as "lake update"
      succeeds.
  generate-description:
    required: false
    default: 'true'
    description: >
      Set to "false" to skip fetching commit descriptions from the GitHub API.
      When false, pr-title, bump-description, and commit-message outputs are empty.
  query-type:
    required: false
    default: 'last-known-good'
    description: >
      Which commit to bump to. One of:
        last-known-good  (default) — the last commit known to build successfully
        first-known-bad            — the first commit known to break the build
                                     (null when no active regression)
        last-good-release          — the latest semver release tag (e.g. v4.13.0)
                                     reachable from the last-known-good commit
  branch:
    required: false
    default: 'hopscotch/lkg-bump'
    description: >
      The bump-PR's branch — same notion as open-bump-pr's `branch` input.
      Used here as a probe target: the action reads the dependency pin from
      the manifest at <github.repository>@<branch> (via GITHUB_TOKEN), and
      if it already pins the dependency at the target commit, exits with
      skipped=true and never invokes hopscotch (so no lake build).

      Defaulted to the same value as open-bump-pr's default, so the typical
      caller pairing the two actions gets sub-daily-cadence idempotency
      automatically — the ~15-min lake build is skipped while the bump PR
      awaits merge. Pass the same value you'd pass to open-bump-pr (the
      reusable wrapper at .github/workflows/bump-dependency-to-latest.yml
      threads the wrapper's `branch` input through to both).

      The probe is automatically disabled when query-type is
      "first-known-bad" — FKB targets live on per-FKB-SHA branches handled
      by track-incompatibility's own short-circuit logic, and probing the
      LKG-branch convention against an FKB target would be wrong by
      construction. So FKB callers do not need to set this.

      A 404 (no branch yet, or just merged), missing manifest, missing
      dependency entry, or any API failure is treated as "no match" so the
      bump runs as normal — better to spend a build than silently miss a
      legitimate one. As a corollary, callers who use a non-default branch
      and don't override this input will simply not get the optimization
      (the probe 404s on `hopscotch/lkg-bump` and the bump runs every tick).

outputs:
  rev:
    description: 'The human-readable ref passed to hopscotch (tag name for last-good-release, SHA otherwise)'
    value: ${{ steps.resolve-outputs.outputs.rev }}
  commit:
    description: 'The resolved commit SHA (always a SHA)'
    value: ${{ steps.resolve-outputs.outputs.commit }}
  current-pin:
    description: 'The commit the project was pinned to before this action ran'
    value: ${{ steps.resolve-outputs.outputs.current_pin }}
  updated:
    description: '"true" if hopscotch successfully bumped the project'
    value: ${{ steps.resolve-outputs.outputs.updated }}
  skipped:
    description: '"true" if the project was already at the target commit'
    value: ${{ steps.resolve-outputs.outputs.skipped }}
  build-failed:
    description: '"true" if hopscotch ran but the build failed'
    value: ${{ steps.resolve-outputs.outputs.build_failed }}
  pr-title:
    description: 'Suggested PR title for the bump (empty when skipped)'
    value: ${{ steps.fetch-descriptions.outputs.pr_title }}
  bump-description:
    description: >
      Markdown paragraph describing the bump (new commit + previous pin,
      with subjects and dates). Pass to open-bump-pr message input.
      Empty when skipped.
    value: ${{ steps.fetch-descriptions.outputs.bump_description }}
  commit-message:
    description: 'Suggested git commit message for the bump (empty when skipped)'
    value: ${{ steps.fetch-descriptions.outputs.commit_message }}

runs:
  using: 'composite'
  steps:
    # ------------------------------------------------------------------
    # Step 1: Look up the target commit for this downstream.
    # Fails fast with a helpful error if the downstream is not found.
    # ------------------------------------------------------------------
    - name: Look up target commit
      id: fetch-snapshot
      shell: bash
      env:
        DOWNSTREAM: ${{ inputs.downstream }}
        QUERY_TYPE: ${{ inputs.query-type }}
      run: bash "${{ github.action_path }}/../../scripts/fetch-latest.sh"

    # ------------------------------------------------------------------
    # Step 1.5: Probe the bump-PR branch for an existing bump. If its
    # manifest already pins the dependency at the target commit, the
    # Compare pins step below short-circuits the entire bump — no
    # hopscotch, no lake build. Keeps sub-daily reruns cheap when the bump
    # PR is awaiting merge: the bump branch already carries the target
    # pin, so re-deriving it on `main` every tick is pure waste.
    #
    # Skipped when:
    #   - query-type is "first-known-bad" — FKB targets live on per-FKB-SHA
    #     branches (e.g. bump-mathlib/fix-<short>) and have their own
    #     short-circuit logic in track-incompatibility; probing a single
    #     bump-PR branch against an FKB target is wrong by construction
    #     and, in the rare state where the branch lingers at a SHA that's
    #     just been recharacterized as the FKB, would silently suppress
    #     the FKB fix PR.
    #   - the target lookup yielded no commit (handled later in Compare).
    #
    # Treated as "no match" (so the bump runs):
    #   - the branch doesn't exist (404), or has no manifest at the path
    #   - the dependency is missing from the branch's manifest
    #   - any GitHub API failure (we don't want a transient blip to
    #     silently skip the legitimate bump)
    # ------------------------------------------------------------------
    - name: Probe bump-PR branch for an existing bump
      id: probe-ref
      if: >-
        inputs.query-type != 'first-known-bad'
        && steps.fetch-snapshot.outputs.commit != ''
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        REF: ${{ inputs.branch }}
        TARGET_COMMIT: ${{ steps.fetch-snapshot.outputs.commit }}
        DEPENDENCY_NAME: ${{ inputs.dependency-name }}
        PROJECT_DIR: ${{ inputs.project-dir }}
      run: |
        set -euo pipefail

        # Build the manifest path relative to the repo root.
        if [ -z "$PROJECT_DIR" ] || [ "$PROJECT_DIR" = "." ]; then
          MANIFEST_PATH="lake-manifest.json"
        else
          # Strip a leading "./" if present.
          rel="${PROJECT_DIR#./}"
          MANIFEST_PATH="${rel%/}/lake-manifest.json"
        fi

        # All failure paths in this step emit no-match and exit 0 — the
        # contract is "any unexpected condition → run the bump as normal,"
        # so that a transient API blip / unfamiliar response shape /
        # malformed manifest can never silently skip a legitimate bump.
        emit_no_match() {
          echo "match=false" >> "$GITHUB_OUTPUT"
          echo "ref_pin="    >> "$GITHUB_OUTPUT"
        }

        # Capture stderr so we can distinguish "branch doesn't exist" (a
        # 404, which is normal — first run, or branch deleted after merge)
        # from a genuine API failure (still treated as no-match, but
        # surfaced via a ::warning:: annotation).
        # `// empty` makes a literal null .content (unexpected schema)
        # come back as the empty string rather than the string "null".
        api_err=$(mktemp)
        if encoded=$(gh api \
            "repos/${GITHUB_REPOSITORY}/contents/${MANIFEST_PATH}?ref=${REF}" \
            --jq '.content // empty' 2>"$api_err"); then
          rm -f "$api_err"
        else
          err=$(cat "$api_err" 2>/dev/null || true)
          rm -f "$api_err"
          if printf '%s' "$err" | grep -q -i 'not found\|404'; then
            echo "Ref '${REF}' has no '${MANIFEST_PATH}' (404 — branch may not exist yet, or was just merged)."
          else
            echo "::warning::Probe of '${REF}:${MANIFEST_PATH}' failed unexpectedly; treating as no-match. Underlying error: ${err}"
          fi
          emit_no_match
          exit 0
        fi

        # Empty: either the response was missing .content (directory
        # listing, error envelope, or some other unexpected schema) or
        # .content was null. We can't distinguish, but we don't need to —
        # both fall through to no-match.
        if [ -z "$encoded" ]; then
          echo "::warning::Probe of '${REF}:${MANIFEST_PATH}' returned no .content (unexpected response shape); treating as no-match."
          emit_no_match
          exit 0
        fi

        # base64 decode and JSON parse are split into separate steps so
        # each can fail independently to no-match. Without this, a non-
        # base64 .content or a manifest that isn't valid JSON would trip
        # set -e / pipefail and crash the whole step.
        if ! manifest=$(printf '%s' "$encoded" | base64 -d 2>/dev/null); then
          echo "::warning::Failed to base64-decode .content from '${REF}:${MANIFEST_PATH}'; treating as no-match."
          emit_no_match
          exit 0
        fi

        # `.packages[]?` and `.rev // empty` keep jq from erroring when
        # the schema isn't what we expect (no .packages array, no .rev
        # field on the matching entry, etc.) — those all yield empty
        # ref_pin and fall through to "dependency not present."
        if ! ref_pin=$(printf '%s' "$manifest" | jq -r --arg dep "$DEPENDENCY_NAME" \
            '.packages[]? | select(.name == $dep) | .rev // empty' 2>/dev/null); then
          echo "::warning::Failed to parse manifest at '${REF}:${MANIFEST_PATH}' as JSON; treating as no-match."
          emit_no_match
          exit 0
        fi

        if [ -z "$ref_pin" ]; then
          echo "Dependency '${DEPENDENCY_NAME}' not present in '${REF}:${MANIFEST_PATH}'."
          emit_no_match
          exit 0
        fi

        echo "Ref '${REF}' pins '${DEPENDENCY_NAME}' at ${ref_pin} (target ${TARGET_COMMIT})."
        echo "ref_pin=${ref_pin}" >> "$GITHUB_OUTPUT"
        if [ "$ref_pin" = "$TARGET_COMMIT" ]; then
          echo "match=true"  >> "$GITHUB_OUTPUT"
        else
          echo "match=false" >> "$GITHUB_OUTPUT"
        fi

    # ------------------------------------------------------------------
    # Step 2: Read the current mathlib pin from lake-manifest.json.
    # ------------------------------------------------------------------
    - name: Read current pin from lake-manifest.json
      id: read-manifest
      shell: bash
      env:
        PROJECT_DIR: ${{ inputs.project-dir }}
        DEPENDENCY_NAME: ${{ inputs.dependency-name }}
      run: |
        set -euo pipefail

        MANIFEST="$PROJECT_DIR/lake-manifest.json"
        if [ ! -f "$MANIFEST" ]; then
          echo "Error: $MANIFEST not found in project-dir '$PROJECT_DIR'."
          exit 1
        fi

        CURRENT_PIN=$(jq -r --arg dep "$DEPENDENCY_NAME" \
          '.packages[] | select(.name == $dep) | .rev' \
          "$MANIFEST")

        if [ -z "$CURRENT_PIN" ]; then
          echo "Error: dependency '$DEPENDENCY_NAME' not found in $MANIFEST."
          echo "Packages present:"
          jq -r '.packages[].name' "$MANIFEST"
          exit 1
        fi

        echo "Current pin for '$DEPENDENCY_NAME': $CURRENT_PIN"
        echo "current_pin=$CURRENT_PIN" >> "$GITHUB_OUTPUT"

    # ------------------------------------------------------------------
    # Step 3: Compare pins. If already at target — either in project-dir's
    # manifest or in the bump-PR branch's manifest — skip the build steps.
    # ------------------------------------------------------------------
    - name: Compare pins
      id: compare
      shell: bash
      env:
        TARGET_REV: ${{ steps.fetch-snapshot.outputs.rev }}
        TARGET_COMMIT: ${{ steps.fetch-snapshot.outputs.commit }}
        CURRENT_PIN: ${{ steps.read-manifest.outputs.current_pin }}
        REF_MATCH: ${{ steps.probe-ref.outputs.match }}
        COMPARE_REF: ${{ inputs.branch }}
      run: |
        # Use TARGET_COMMIT (SHA) for the equality check so that tag names
        # compare correctly against the SHA stored in lake-manifest.json.
        if [ -z "$TARGET_REV" ]; then
          echo "Target commit is empty (no active entry for this query-type) — nothing to do."
          echo "skipped=true" >> "$GITHUB_OUTPUT"
        elif [ "${REF_MATCH:-}" = "true" ]; then
          echo "Ref '${COMPARE_REF}' already pins the dependency at target $TARGET_REV — nothing to do."
          echo "skipped=true" >> "$GITHUB_OUTPUT"
        elif [ "$CURRENT_PIN" = "$TARGET_COMMIT" ]; then
          echo "Already at target $TARGET_REV — nothing to do."
          echo "skipped=true" >> "$GITHUB_OUTPUT"
        else
          echo "Pin needs update: $CURRENT_PIN → $TARGET_REV"
          echo "skipped=false" >> "$GITHUB_OUTPUT"
        fi

    # ------------------------------------------------------------------
    # Step 4: Fetch one-line commit descriptions for the target commit and
    # the current pin, and compose the PR title, body snippet, and git
    # commit message. Runs whenever a bump is needed; outputs are empty
    # when the project is already at the target commit (skipped=true).
    # ------------------------------------------------------------------
    - name: Fetch commit descriptions
      id: fetch-descriptions
      if: steps.compare.outputs.skipped != 'true' && inputs.generate-description != 'false'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        TARGET_COMMIT: ${{ steps.fetch-snapshot.outputs.rev }}
        CURRENT_PIN: ${{ steps.read-manifest.outputs.current_pin }}
        DEPENDENCY_NAME: ${{ inputs.dependency-name }}
        DEPENDENCY_REPO: leanprover-community/mathlib4
      run: |
        set -euo pipefail

        fetch_info() {
          local sha="$1"
          # Returns <subject>\t<committer-date YYYY-MM-DD>, or empty on failure.
          gh api "repos/${DEPENDENCY_REPO}/commits/${sha}" \
            --jq '[(.commit.message | split("\n")[0]), .commit.committer.date[:10]] | join("\t")' \
            2>/dev/null || true
        }

        suffix() {
          local subject="$1" date="$2" result=""
          [ -n "$subject" ] && result="${result}: ${subject}"
          [ -n "$date" ]    && result="${result} (${date})"
          printf '%s' "$result"
        }

        TARGET_INFO=$(fetch_info "$TARGET_COMMIT")
        TARGET_SUBJECT=$(printf '%s' "$TARGET_INFO" | cut -f1)
        TARGET_DATE=$(printf '%s' "$TARGET_INFO" | cut -f2)

        PREV_INFO=$(fetch_info "$CURRENT_PIN")
        PREV_SUBJECT=$(printf '%s' "$PREV_INFO" | cut -f1)
        PREV_DATE=$(printf '%s' "$PREV_INFO" | cut -f2)

        TARGET_SHORT="${TARGET_COMMIT:0:7}"
        PREV_SHORT="${CURRENT_PIN:0:7}"
        TARGET_URL="https://github.com/${DEPENDENCY_REPO}/commit/${TARGET_COMMIT}"
        PREV_URL="https://github.com/${DEPENDENCY_REPO}/commit/${CURRENT_PIN}"

        TARGET_SUFFIX=$(suffix "$TARGET_SUBJECT" "$TARGET_DATE")
        PREV_SUFFIX=$(suffix "$PREV_SUBJECT" "$PREV_DATE")

        PR_TITLE="Bump \`${DEPENDENCY_NAME}\` dependency to ${TARGET_SHORT}"
        COMMIT_MSG="chore: bump ${DEPENDENCY_NAME} to ${TARGET_SHORT}${TARGET_SUFFIX}"

        {
          echo "pr_title=${PR_TITLE}"
          echo "commit_message=${COMMIT_MSG}"
          echo "bump_description<<BUMP_EOF"
          printf 'Bump `%s` dependency to [%s](%s)%s\n' \
            "$DEPENDENCY_NAME" "$TARGET_SHORT" "$TARGET_URL" "$TARGET_SUFFIX"
          printf 'Previously at: [%s](%s)%s\n' \
            "$PREV_SHORT" "$PREV_URL" "$PREV_SUFFIX"
          echo "BUMP_EOF"
        } >> "$GITHUB_OUTPUT"

    # ------------------------------------------------------------------
    # Steps 5–7 only run when an update is needed.
    # ------------------------------------------------------------------

    - name: Install Lean (elan)
      if: steps.compare.outputs.skipped != 'true'
      shell: bash
      run: |
        curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
          -sSf | sh -s -- -y --default-toolchain none
        echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

    - name: Download hopscotch binary
      if: steps.compare.outputs.skipped != 'true'
      shell: bash
      env:
        HOPSCOTCH_VERSION: ${{ inputs.hopscotch-version }}
      run: |
        set -euo pipefail
        TOOL_DIR="$RUNNER_TEMP/hopscotch-bin"
        mkdir -p "$TOOL_DIR"
        curl -L \
          "https://github.com/leanprover-community/hopscotch/releases/download/${HOPSCOTCH_VERSION}/hopscotch-linux-x86_64" \
          -o "$TOOL_DIR/hopscotch"
        chmod +x "$TOOL_DIR/hopscotch"
        echo "$TOOL_DIR" >> "$GITHUB_PATH"

    - name: Clean any stale hopscotch session
      if: steps.compare.outputs.skipped != 'true'
      shell: bash
      env:
        PROJECT_DIR: ${{ inputs.project-dir }}
      run: |
        # Ignore errors — clean is a best-effort guard against leftover state.
        hopscotch clean --project-dir "$PROJECT_DIR" || true

    # ------------------------------------------------------------------
    # Step 7: Run hopscotch to bump and build.
    #
    # Exit codes:
    #   0 → bumped and built successfully (lakefile updated)
    #   1 → build failed (lakefile left at original pin by --keep-last-good)
    #   2+ → tool error (fail the step)
    # ------------------------------------------------------------------
    - name: Run hopscotch dep
      id: run-hopscotch
      if: steps.compare.outputs.skipped != 'true'
      shell: bash
      env:
        DEPENDENCY_NAME: ${{ inputs.dependency-name }}
        CURRENT_PIN: ${{ steps.read-manifest.outputs.current_pin }}
        TARGET_COMMIT: ${{ steps.fetch-snapshot.outputs.rev }}
        PROJECT_DIR: ${{ inputs.project-dir }}
        GITHUB_TOKEN: ${{ github.token }}
        HOPSCOTCH_SKIP_BUILD: ${{ inputs.skip-build }}
        KEEP_LAST_GOOD: ${{ inputs.query-type != 'first-known-bad' }}
      run: |
        set +e

        ARGS=(
          dep "$DEPENDENCY_NAME"
          --from "${TARGET_COMMIT}~1"
          --to "$TARGET_COMMIT"
          --project-dir "$PROJECT_DIR"
          --scan-mode linear
          --allow-dirty-workspace
        )

        # Only pass the flag if enabled
        if [ "$KEEP_LAST_GOOD" = "true" ]; then
          ARGS+=(--keep-last-good)
        fi

        hopscotch "${ARGS[@]}"
        EXIT_CODE=$?

        set -e

        if [ "$EXIT_CODE" -eq 0 ]; then
          echo "hopscotch: bump succeeded."
          echo "updated=true" >> "$GITHUB_OUTPUT"
          echo "build_failed=false" >> "$GITHUB_OUTPUT"

        elif [ "$EXIT_CODE" -eq 1 ]; then
          if [ "$KEEP_LAST_GOOD" = "true" ]; then
            echo "hopscotch: build failed with the LKG (this is unexpected)."
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "build_failed=true" >> "$GITHUB_OUTPUT"
            exit "$EXIT_CODE"
          else
            echo "hopscotch: build failed but expected (no keep-last-good)."
            echo "updated=true" >> "$GITHUB_OUTPUT"
            echo "build_failed=true" >> "$GITHUB_OUTPUT"
          fi

        else
          echo "hopscotch: tool error (exit $EXIT_CODE)."
          exit "$EXIT_CODE"
        fi
    # ------------------------------------------------------------------
    # Final step: consolidate outputs with safe defaults so callers never
    # see empty strings for boolean-valued outputs.
    # ------------------------------------------------------------------
    - name: Resolve outputs
      id: resolve-outputs
      if: always()
      shell: bash
      env:
        TARGET_REV: ${{ steps.fetch-snapshot.outputs.rev }}
        TARGET_COMMIT: ${{ steps.fetch-snapshot.outputs.commit }}
        CURRENT_PIN: ${{ steps.read-manifest.outputs.current_pin }}
        SKIPPED: ${{ steps.compare.outputs.skipped }}
        UPDATED: ${{ steps.run-hopscotch.outputs.updated }}
        BUILD_FAILED: ${{ steps.run-hopscotch.outputs.build_failed }}
      run: |
        echo "rev=${TARGET_REV:-}"                 >> "$GITHUB_OUTPUT"
        echo "commit=${TARGET_COMMIT:-}"           >> "$GITHUB_OUTPUT"
        echo "current_pin=${CURRENT_PIN:-}"        >> "$GITHUB_OUTPUT"
        echo "skipped=${SKIPPED:-false}"           >> "$GITHUB_OUTPUT"
        echo "updated=${UPDATED:-false}"           >> "$GITHUB_OUTPUT"
        echo "build_failed=${BUILD_FAILED:-false}" >> "$GITHUB_OUTPUT"
