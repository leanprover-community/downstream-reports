name: 'Query Latest'
description: >
  Look up a downstream's target commit (last-known-good or first-known-bad)
  from the snapshot. Accepts either a downstream name (e.g. "physlib") or a
  full repo slug (e.g. "leanprover-community/physlib"). Defaults to the
  current repository.

inputs:
  downstream:
    required: false
    default: ${{ github.repository }}
    description: >
      Downstream to look up. May be a registered downstream name (e.g. "physlib")
      or a GitHub repo slug (e.g. "leanprover-community/physlib"). When the value
      contains a "/" it is treated as a repo slug; otherwise as a name key.
      Defaults to the repository running this action.
  query-type:
    required: false
    default: 'last-known-good'
    description: >
      Which commit to return. One of:
        last-known-good  (default) — the last commit known to build successfully
        first-known-bad            — the first commit known to break the build
                                     (null when no active regression)

outputs:
  commit:
    description: 'The target commit SHA (last-known-good or first-known-bad depending on query-type)'
    value: ${{ steps.lookup.outputs.commit }}
  downstream-name:
    description: 'The downstream name key as registered in the snapshot'
    value: ${{ steps.lookup.outputs.downstream_name }}
  repo:
    description: 'The GitHub repo slug for the downstream (owner/repo)'
    value: ${{ steps.lookup.outputs.repo }}
  dependency-name:
    description: 'The dependency name field from the snapshot entry'
    value: ${{ steps.lookup.outputs.dependency_name }}

runs:
  using: 'composite'
  steps:
    - name: Fetch snapshot and look up downstream
      id: lookup
      shell: bash
      env:
        DOWNSTREAM: ${{ inputs.downstream }}
        QUERY_TYPE: ${{ inputs.query-type }}
      run: bash "${{ github.action_path }}/../../scripts/fetch-latest.sh"
