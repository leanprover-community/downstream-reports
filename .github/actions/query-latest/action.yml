name: 'Query Latest'
description: >
  Look up a downstream's target commit (last-known-good, first-known-bad,
  last-good-release, or latest-known) from the snapshot. Accepts either a
  downstream name (e.g. "physlib") or a full repo slug (e.g.
  "leanprover-community/physlib"). Defaults to the current repository.

inputs:
  downstream:
    required: false
    default: ${{ github.repository }}
    description: >
      Downstream to look up. May be a registered downstream name (e.g. "physlib")
      or a GitHub repo slug (e.g. "leanprover-community/physlib"). When the value
      contains a "/" it is treated as a repo slug; otherwise as a name key.
      Defaults to the repository running this action.
  query-type:
    required: false
    default: 'last-known-good'
    description: >
      Which commit to return. One of:
        last-known-good  (default) — the last commit known to build successfully
        first-known-bad            — the first commit known to break the build
                                     (null when no active regression)
        last-good-release          — the latest semver release tag (e.g. v4.13.0)
                                     reachable from the last-known-good commit
        latest-known               — first-known-bad if one exists, else
                                     last-known-good

outputs:
  rev:
    description: 'The human-readable ref (tag name for last-good-release, SHA for other query types)'
    value: ${{ steps.lookup.outputs.rev }}
  commit:
    description: 'The resolved commit SHA (same as rev for non-release query types)'
    value: ${{ steps.lookup.outputs.commit }}
  downstream-name:
    description: 'The downstream name key as registered in the snapshot'
    value: ${{ steps.lookup.outputs.downstream_name }}
  repo:
    description: 'The GitHub repo slug for the downstream (owner/repo)'
    value: ${{ steps.lookup.outputs.repo }}
  dependency-name:
    description: 'The dependency name field from the snapshot entry'
    value: ${{ steps.lookup.outputs.dependency_name }}
  resolved-query-type:
    description: >
      Which type was actually used to pick the target. Mirrors the input
      for static query types; for "latest-known" it is "first-known-bad"
      (FKB present) or "last-known-good" (otherwise).
    value: ${{ steps.lookup.outputs.resolved_query_type }}

runs:
  using: 'composite'
  steps:
    - name: Fetch snapshot and look up downstream
      id: lookup
      shell: bash
      env:
        DOWNSTREAM: ${{ inputs.downstream }}
        QUERY_TYPE: ${{ inputs.query-type }}
      run: bash "${{ github.action_path }}/../../scripts/fetch-latest.sh"
