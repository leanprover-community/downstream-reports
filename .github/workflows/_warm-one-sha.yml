name: warm-mathlib-cache (one SHA)

# Per-SHA worker invoked once per matrix entry by warm-mathlib-cache.yml.
# Three jobs:
#
#   build_and_stage  — self-hosted, NO cache token. Clones mathlib at
#                      <sha>, probes the cache, builds Mathlib if
#                      needed, stages .ltar files. The cache tool is
#                      built fresh from a shallow master checkout.
#   upload_cache     — ubuntu, holds the cache bearer token (minted via
#                      OIDC bound to the cache-warming-token
#                      environment). Builds its own cache tool from a
#                      shallow master checkout and runs `put-staged`.
#   verify           — ubuntu, NO token. Independent confirmation that
#                      every Mathlib olean is fetchable: fresh clone,
#                      `cache get`, `lake build --no-build --rehash -v
#                      Mathlib`.
#
# Job chaining: each job exposes its terminal/non-terminal status as a
# job output, and the next job's `if:` skips it when the chain is
# already done. The job that produces a terminal status uploads
# `warm-result-<sha>` directly, so the orchestrator's finalize job always
# has exactly one final result per SHA:
#
#   already_warm | build_failed     → uploaded by build_and_stage
#   push_failed                     → uploaded by upload_cache
#   warmed | verify_failed          → uploaded by verify

on:
  workflow_call:
    inputs:
      sha:
        description: "Mathlib master SHA to warm (40-char hex)."
        type: string
        required: true
      tag:
        description: "Why we're warming this SHA: lkg | fkb | both | manual."
        type: string
        required: true
      downstreams_json:
        description: 'JSON array of downstream names benefitting from this SHA, e.g. ["physlib","FLT"].'
        type: string
        required: true

permissions:
  contents: read
  id-token: write   # required for OIDC bearer mint in upload_cache

jobs:
  build_and_stage:
    runs-on: [self-hosted, pr]
    outputs:
      status: ${{ steps.write_result.outputs.status }}
    steps:
      # Self-hosted `pr` runner doesn't ship jq. linux/amd64 only;
      # fine for this runner label.
      - name: Install jq
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64 \
            -o "$HOME/.local/bin/jq"
          chmod +x "$HOME/.local/bin/jq"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      # Full commit history (blobs deferred). Needed so the next step
      # can run an ancestor check against origin/master.
      - name: Clone mathlib at target SHA
        run: |
          git clone --filter=blob:none https://github.com/leanprover-community/mathlib4 mathlib4

      # Refuse non-master SHAs. Guards against operator typos in
      # `workflow_dispatch shas=...` and any future code path that
      # might surface a non-master SHA from the DB.
      - name: Verify SHA is on master
        env:
          SHA: ${{ inputs.sha }}
        working-directory: mathlib4
        run: |
          if ! git cat-file -e "$SHA"; then
            echo "::error::SHA $SHA does not exist in mathlib4."
            exit 1
          fi
          if ! git merge-base --is-ancestor "$SHA" origin/master; then
            echo "::error::SHA $SHA is not reachable from origin/master. Refusing to warm cache for non-master SHAs."
            exit 1
          fi
          echo "Confirmed: $SHA is on master."

      - name: Checkout SHA
        env:
          SHA: ${{ inputs.sha }}
        run: git -C mathlib4 checkout "$SHA"

      # Build the cache tool from a shallow master checkout, kept
      # separate from the target SHA's working tree. Both jobs use
      # this pattern, mirroring mathlib4/build_template.yml's
      # tools-branch idiom.
      - name: Clone mathlib master (cache tool)
        run: |
          git clone --depth=1 --branch=master \
            https://github.com/leanprover-community/mathlib4 mathlib4-tools

      - name: Build cache tool
        working-directory: mathlib4-tools
        run: lake build cache

      # The master cache binary resolves `leantar` strictly from the
      # active toolchain's sysroot (`<lean --print-prefix>/bin/leantar`,
      # see Cache/IO.lean leantarSysrootBin) — PATH is not consulted.
      # Target SHAs older than nightly-2026-03-09 pin a toolchain that
      # predates leantar bundling, so cache stage/probe explode with
      # "leantar not found in Lean sysroot". Backfill by copying master's
      # leantar (always recent enough) into the target sysroot.
      - name: Backfill leantar into target toolchain (if missing)
        run: |
          set -euo pipefail
          # Trigger elan install of both toolchains so --print-prefix resolves.
          ( cd mathlib4         && lean --version ) >/dev/null
          ( cd mathlib4-tools   && lean --version ) >/dev/null
          TARGET_PREFIX=$( cd mathlib4       && lean --print-prefix )
          TOOLS_PREFIX=$(  cd mathlib4-tools && lean --print-prefix )
          if [ -x "$TARGET_PREFIX/bin/leantar" ]; then
            echo "leantar already present in target sysroot: $TARGET_PREFIX/bin/leantar"
            exit 0
          fi
          if [ ! -x "$TOOLS_PREFIX/bin/leantar" ]; then
            echo "::error::No leantar in master tools sysroot ($TOOLS_PREFIX/bin/leantar); cannot backfill."
            exit 1
          fi
          cp "$TOOLS_PREFIX/bin/leantar" "$TARGET_PREFIX/bin/leantar"
          echo "Backfilled leantar: $TOOLS_PREFIX/bin/leantar -> $TARGET_PREFIX/bin/leantar"

      # `lake env <cmd>` evaluates the lakefile in the current working
       # directory, resolves deps, and sets LEAN_PATH / LEAN_SRC_PATH so
       # the cache binary can find Mathlib modules — invoking the cache
       # binary directly fails with "unknown module prefix 'Mathlib'".
      # Each retryable step gets one extra attempt to absorb transient
      # flakes (Azure 503, network blip, runner hiccup). After the
      # second failure the step reports failure to its `outcome:` and
      # the per-SHA result captures it as build_failed / push_failed /
      # verify_failed — best-effort, never fails the workflow_run.
      - name: Probe cache completeness
        id: probe
        working-directory: mathlib4
        continue-on-error: true
        run: |
          probe() {
            lake env ../mathlib4-tools/.lake/build/bin/cache get \
              && lake build --no-build -v Mathlib
          }
          if ! probe; then
            echo "::warning::Probe attempt 1 failed, retrying once..."
            probe
          fi

      - name: Build Mathlib
        id: build
        if: steps.probe.outcome != 'success'
        working-directory: mathlib4
        continue-on-error: true
        run: |
          if ! lake build Mathlib; then
            echo "::warning::Build attempt 1 failed, retrying once..."
            lake build Mathlib
          fi

      - name: Stage cache
        id: stage
        if: steps.build.outcome == 'success'
        working-directory: mathlib4
        continue-on-error: true
        run: |
          stage() {
            lake env ../mathlib4-tools/.lake/build/bin/cache stage \
              --staging-dir=../cache-staging
          }
          if ! stage; then
            echo "::warning::Stage attempt 1 failed, retrying once..."
            stage
          fi

      # Just .ltar files — no binary. upload_cache builds its own
      # trusted cache tool from a clean master checkout.
      - name: Upload staging artifact
        if: steps.stage.outcome == 'success'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: stage-${{ inputs.sha }}
          path: cache-staging/
          if-no-files-found: error

      - name: Write result
        id: write_result
        if: always()
        env:
          SHA: ${{ inputs.sha }}
          TAG: ${{ inputs.tag }}
          DOWNSTREAMS_JSON: ${{ inputs.downstreams_json }}
          PROBE_OUTCOME: ${{ steps.probe.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          STAGE_OUTCOME: ${{ steps.stage.outcome }}
        run: |
          if   [ "$PROBE_OUTCOME" = "success" ];   then STATUS=already_warm
          elif [ "$BUILD_OUTCOME" != "success" ];  then STATUS=build_failed
          elif [ "$STAGE_OUTCOME" != "success" ];  then STATUS=build_failed
          else                                          STATUS=staged
          fi
          mkdir -p out
          jq -n \
            --arg sha "$SHA" \
            --arg tag "$TAG" \
            --arg status "$STATUS" \
            --argjson downstreams "$DOWNSTREAMS_JSON" \
            '{sha:$sha, tag:$tag, status:$status, downstreams:$downstreams}' \
            > "out/result.json"
          cat out/result.json
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      # Terminal: upload directly as the final result (already_warm,
      # build_failed). The chain stops here.
      - name: Upload final result (terminal)
        if: always() && steps.write_result.outputs.status != 'staged'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: warm-result-${{ inputs.sha }}
          path: out/result.json
          if-no-files-found: error

      # Non-terminal: hand off to upload_cache.
      - name: Upload intermediate result (staged)
        if: steps.write_result.outputs.status == 'staged'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: intermediate-${{ inputs.sha }}
          path: out/result.json
          if-no-files-found: error

  upload_cache:
    needs: build_and_stage
    if: needs.build_and_stage.outputs.status == 'staged'
    runs-on: ubuntu-latest
    # Bind the OIDC subject claim to a GitHub Environment, NOT a
    # branch, so the federated credential on the mathlib cache-writer
    # Azure app accepts dispatch from any branch. Production runs are
    # still gated to main by the workflow_run filter on the
    # orchestrator.
    environment: cache-warming-token
    outputs:
      status: ${{ steps.write_result.outputs.status }}
    steps:
      - name: Download intermediate result
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: intermediate-${{ inputs.sha }}
          path: prev

      - name: Download staging artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: stage-${{ inputs.sha }}
          path: cache-staging

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      # Build a trusted cache binary from a clean master checkout —
      # the same pattern build_and_stage uses. The cache token below
      # never sees any binary produced by the build runner.
      - name: Clone mathlib master (cache tool)
        run: |
          git clone --depth=1 --branch=master \
            https://github.com/leanprover-community/mathlib4 mathlib4-tools

      - name: Build cache tool
        working-directory: mathlib4-tools
        run: lake build cache

      # Manual OIDC ↔ Entra exchange. Same flow as
      # mathlib's azure-create-cache-token action, done inline so the
      # workflow doesn't depend on `az` being on PATH.
      - name: Mint Azure cache bearer token
        id: cache_token
        env:
          AZ_CLIENT_ID: ${{ secrets.MATHLIB_CACHE_WRITER_CLIENT_ID }}
          AZ_TENANT_ID: ${{ secrets.LPC_AZ_TENANT_ID }}
        run: |
          set -euo pipefail

          ID_TOKEN=$(curl -fsSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" \
            | jq -er .value)

          BEARER=$(curl -fsSL -X POST \
            "https://login.microsoftonline.com/$AZ_TENANT_ID/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "client_id=$AZ_CLIENT_ID" \
            --data-urlencode "scope=https://storage.azure.com/.default" \
            --data-urlencode "client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer" \
            --data-urlencode "client_assertion=$ID_TOKEN" \
            --data-urlencode "grant_type=client_credentials" \
            | jq -er .access_token)

          if [ -z "$BEARER" ] || [ "$BEARER" = "null" ]; then
            echo "::error::Failed to mint Azure bearer token (empty response)."
            exit 1
          fi

          echo "::add-mask::$BEARER"
          echo "MATHLIB_CACHE_AZURE_BEARER_TOKEN=$BEARER" >> "$GITHUB_ENV"

      - name: Push staged cache to Azure
        id: push
        continue-on-error: true   # best-effort; push_failed surfaces in result.json
        working-directory: mathlib4-tools
        env:
          MATHLIB_CACHE_USE_CLOUDFLARE: "0"
        run: |
          push() {
            lake env .lake/build/bin/cache put-staged \
              --staging-dir=../cache-staging \
              --repo=leanprover-community/mathlib4
          }
          if ! push; then
            echo "::warning::Push attempt 1 failed, retrying once..."
            push
          fi

      # Narrow the bearer's exposure to roughly mint→push.
      - name: Clear cache bearer token
        if: always() && steps.cache_token.outcome == 'success'
        run: |
          echo "MATHLIB_CACHE_AZURE_BEARER_TOKEN=" >> "$GITHUB_ENV"

      - name: Write result
        id: write_result
        if: always()
        env:
          PUSH_OUTCOME: ${{ steps.push.outcome }}
        run: |
          mkdir -p out
          if [ "$PUSH_OUTCOME" = "success" ]; then
            STATUS=pushed
          else
            STATUS=push_failed
          fi
          jq --arg status "$STATUS" '.status=$status' prev/result.json > out/result.json
          cat out/result.json
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      # Terminal: push_failed becomes the final result.
      - name: Upload final result (push_failed)
        if: always() && steps.write_result.outputs.status == 'push_failed'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: warm-result-${{ inputs.sha }}
          path: out/result.json
          if-no-files-found: error

      # Non-terminal: hand off to verify.
      - name: Upload pushed result
        if: steps.write_result.outputs.status == 'pushed'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pushed-${{ inputs.sha }}
          path: out/result.json
          if-no-files-found: error

      - name: Annotate push failure
        if: steps.push.outcome == 'failure'
        run: |
          echo "::warning::Cache push failed for ${{ inputs.sha }} after one retry; recorded as push_failed and skipped on future ticks."

  verify:
    needs: upload_cache
    if: needs.upload_cache.outputs.status == 'pushed'
    runs-on: ubuntu-latest
    steps:
      - name: Download pushed result
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pushed-${{ inputs.sha }}
          path: prev

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Verify cache for SHA
        id: verify
        continue-on-error: true   # best-effort; verify_failed surfaces in result.json
        env:
          SHA: ${{ inputs.sha }}
        run: |
          verify_once() {
            lake exe cache get \
              && lake build --no-build --rehash -v Mathlib
          }
          git clone --filter=blob:none https://github.com/leanprover-community/mathlib4 mathlib4
          git -C mathlib4 fetch origin "$SHA" --depth 1
          git -C mathlib4 checkout "$SHA"
          cd mathlib4
          if ! verify_once; then
            echo "::warning::Verify attempt 1 failed, retrying once..."
            verify_once
          fi

      - name: Write final result
        if: always()
        env:
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        run: |
          if [ "$VERIFY_OUTCOME" = "success" ]; then
            STATUS=warmed
          else
            STATUS=verify_failed
          fi
          mkdir -p out
          jq --arg status "$STATUS" '.status=$status' prev/result.json > out/result.json
          cat out/result.json

      - name: Upload final result
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: warm-result-${{ inputs.sha }}
          path: out/result.json
          if-no-files-found: error

      - name: Annotate verify failure
        if: steps.verify.outcome == 'failure'
        run: |
          echo "::warning::Cache verification failed for ${{ inputs.sha }} after one retry; recorded as verify_failed and skipped on future ticks."
