name: warm-mathlib-cache (one SHA)

# Per-SHA worker invoked once per matrix entry by warm-mathlib-cache.yml.
# Two jobs:
#
#   build_stage_push — self-hosted, holds the cache bearer token (minted
#                      via OIDC bound to the cache-warming-token
#                      environment). Clones mathlib at <sha>, probes the
#                      cache, builds Mathlib if needed, stages, and
#                      pushes to Azure.
#   verify           — ubuntu, NO token. Independent confirmation that
#                      every Mathlib olean is fetchable from the cache
#                      after the push: fresh clone, `cache get`, then
#                      `lake build --no-build --rehash -v Mathlib`.
#
# Job chaining: build_stage_push exposes its terminal/non-terminal
# status as a job output, and `verify`'s `if:` skips it when the chain
# is already done. The job that produces a terminal status uploads the
# `warm-result-<sha>` artifact directly:
#
#   already_warm | build_failed | push_failed → uploaded by build_stage_push
#   warmed | verify_failed                    → uploaded by verify

on:
  workflow_call:
    inputs:
      sha:
        description: "Mathlib master SHA to warm (40-char hex)."
        type: string
        required: true
      tag:
        description: "Why we're warming this SHA: lkg | fkb | both | manual."
        type: string
        required: true
      downstreams_json:
        description: 'JSON array of downstream names benefitting from this SHA, e.g. ["physlib","FLT"].'
        type: string
        required: true

permissions:
  contents: read
  id-token: write   # required for OIDC bearer mint

jobs:
  build_stage_push:
    runs-on: [self-hosted, pr]
    # Bind the OIDC subject claim to a GitHub Environment, NOT a branch,
    # so the federated credential on the mathlib cache-writer Azure app
    # (configured against
    #   repo:leanprover-community/downstream-reports:environment:cache-warming-token)
    # accepts dispatch from any branch. Production runs are still gated
    # to main by the workflow_run filter on the orchestrator workflow.
    environment: cache-warming-token
    outputs:
      status: ${{ steps.write_result.outputs.status }}
    steps:
      # The self-hosted `pr` runner doesn't ship jq. linux/amd64-only,
      # which is fine for the `pr` label.
      - name: Install jq
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64 \
            -o "$HOME/.local/bin/jq"
          chmod +x "$HOME/.local/bin/jq"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      # Full commit history (blobs deferred). Needed so the next step
      # can run an ancestor check against origin/master.
      - name: Clone mathlib
        run: |
          git clone --filter=blob:none https://github.com/leanprover-community/mathlib4 mathlib4

      # Refuse to warm cache for SHAs that aren't on master. This guards
      # against operator typos in `workflow_dispatch shas=...` and any
      # future code path that might surface a non-master SHA from the DB.
      - name: Verify SHA is on master
        env:
          SHA: ${{ inputs.sha }}
        working-directory: mathlib4
        run: |
          if ! git cat-file -e "$SHA"; then
            echo "::error::SHA $SHA does not exist in mathlib4."
            exit 1
          fi
          if ! git merge-base --is-ancestor "$SHA" origin/master; then
            echo "::error::SHA $SHA is not reachable from origin/master. Refusing to warm cache for non-master SHAs."
            exit 1
          fi
          echo "Confirmed: $SHA is on master."

      - name: Checkout SHA
        env:
          SHA: ${{ inputs.sha }}
        run: git -C mathlib4 checkout "$SHA"

      - name: Build cache tool
        working-directory: mathlib4
        run: lake build cache

      - name: Probe cache completeness
        id: probe
        working-directory: mathlib4
        continue-on-error: true
        run: |
          lake exe cache get
          lake build --no-build -v Mathlib

      - name: Build Mathlib
        id: build
        if: steps.probe.outcome != 'success'
        working-directory: mathlib4
        continue-on-error: true
        run: lake build Mathlib

      - name: Stage cache
        id: stage
        if: steps.build.outcome == 'success'
        working-directory: mathlib4
        run: lake exe cache stage --staging-dir=../cache-staging

      - name: Mint Azure cache bearer token
        if: steps.stage.outcome == 'success'
        id: cache_token
        uses: leanprover-community/mathlib-ci/.github/actions/azure-create-cache-token@17db5ff55a65df98d55cbddcc67938f70d10dab2
        with:
          azure-client-id: ${{ secrets.MATHLIB_CACHE_WRITER_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.LPC_AZ_TENANT_ID }}

      - name: Push staged cache to Azure
        if: steps.stage.outcome == 'success'
        id: push
        continue-on-error: true   # capture push_failed before failing the job
        working-directory: mathlib4
        env:
          MATHLIB_CACHE_USE_CLOUDFLARE: "0"
        run: |
          lake env .lake/build/bin/cache put-staged \
            --staging-dir=../cache-staging \
            --repo=leanprover-community/mathlib4

      # The mint action writes MATHLIB_CACHE_AZURE_BEARER_TOKEN into
      # $GITHUB_ENV, exposing it to every subsequent step. The build
      # already ran (mint happens after `lake build Mathlib`), but we
      # still don't want the token in the env of the result-writing /
      # artifact-upload steps below. Clearing here narrows the token's
      # exposure to roughly mint→push.
      - name: Clear cache bearer token
        if: always() && steps.cache_token.outcome == 'success'
        run: |
          echo "MATHLIB_CACHE_AZURE_BEARER_TOKEN=" >> "$GITHUB_ENV"

      - name: Write result
        id: write_result
        if: always()
        env:
          SHA: ${{ inputs.sha }}
          TAG: ${{ inputs.tag }}
          DOWNSTREAMS_JSON: ${{ inputs.downstreams_json }}
          PROBE_OUTCOME: ${{ steps.probe.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          STAGE_OUTCOME: ${{ steps.stage.outcome }}
          PUSH_OUTCOME: ${{ steps.push.outcome }}
        run: |
          if   [ "$PROBE_OUTCOME" = "success" ];   then STATUS=already_warm
          elif [ "$BUILD_OUTCOME" != "success" ];  then STATUS=build_failed
          elif [ "$STAGE_OUTCOME" != "success" ];  then STATUS=build_failed
          elif [ "$PUSH_OUTCOME"  != "success" ];  then STATUS=push_failed
          else                                          STATUS=pushed
          fi
          mkdir -p out
          jq -n \
            --arg sha "$SHA" \
            --arg tag "$TAG" \
            --arg status "$STATUS" \
            --argjson downstreams "$DOWNSTREAMS_JSON" \
            '{sha:$sha, tag:$tag, status:$status, downstreams:$downstreams}' \
            > "out/result.json"
          cat out/result.json
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      # Terminal: upload directly as final result. Covers
      # already_warm, build_failed, push_failed.
      - name: Upload final result (terminal)
        if: always() && steps.write_result.outputs.status != 'pushed'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: warm-result-${{ inputs.sha }}
          path: out/result.json
          if-no-files-found: error

      # Non-terminal: hand off to verify.
      - name: Upload pushed result
        if: steps.write_result.outputs.status == 'pushed'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pushed-${{ inputs.sha }}
          path: out/result.json
          if-no-files-found: error

      - name: Surface push failure as a job failure
        if: steps.push.outcome == 'failure'
        run: |
          echo "::error::Cache push failed for ${{ inputs.sha }}."
          exit 1

  verify:
    needs: build_stage_push
    if: needs.build_stage_push.outputs.status == 'pushed'
    runs-on: ubuntu-latest
    steps:
      - name: Download pushed result
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pushed-${{ inputs.sha }}
          path: prev

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Verify cache for SHA
        id: verify
        continue-on-error: true   # capture verify_failed before failing the job
        env:
          SHA: ${{ inputs.sha }}
        run: |
          git clone --filter=blob:none https://github.com/leanprover-community/mathlib4 mathlib4
          git -C mathlib4 fetch origin "$SHA" --depth 1
          git -C mathlib4 checkout "$SHA"
          cd mathlib4
          lake exe cache get
          lake build --no-build --rehash -v Mathlib

      - name: Write final result
        if: always()
        env:
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        run: |
          if [ "$VERIFY_OUTCOME" = "success" ]; then
            STATUS=warmed
          else
            STATUS=verify_failed
          fi
          jq --arg status "$STATUS" '.status=$status' prev/result.json > final.json
          cat final.json

      - name: Upload final result
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: warm-result-${{ inputs.sha }}
          path: final.json
          if-no-files-found: error

      - name: Surface verify failure as a job failure
        if: steps.verify.outcome == 'failure'
        run: |
          echo "::error::Cache verification failed for ${{ inputs.sha }}: not all Mathlib oleans are present after the push."
          exit 1
