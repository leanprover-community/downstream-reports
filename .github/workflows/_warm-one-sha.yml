name: warm-mathlib-cache (one SHA)

# Per-SHA worker invoked once per matrix entry by warm-mathlib-cache.yml.
# Three jobs:
#
#   build_and_stage  — self-hosted, NO cache token. Clones mathlib at
#                      <sha>, probes whether the cache is already
#                      complete, and if not builds Mathlib and stages
#                      the resulting .ltar files.
#   upload_cache     — ubuntu, has cache bearer token (minted via OIDC
#                      bound to the cache-warming-token environment).
#                      Pushes staged .ltar files to Azure.
#   verify           — ubuntu, NO token. Replicates mathlib's post_steps
#                      verification: fresh clone, `cache get`, then
#                      `lake build --no-build --rehash -v Mathlib`.
#
# The token never flows to a runner that runs `lake build Mathlib`,
# matching mathlib4/build_template.yml's split between the build and
# upload_cache jobs.
#
# Job chaining: each job exposes its terminal/non-terminal status as a
# job output, and the next job's `if:` skips it when the chain is
# already done. The job that produces a terminal status uploads the
# `warm-result-<sha>` artifact directly. So:
#
#   already_warm | build_failed     → uploaded by build_and_stage
#   push_failed                     → uploaded by upload_cache
#   warmed | verify_failed          → uploaded by verify

on:
  workflow_call:
    inputs:
      sha:
        description: "Mathlib master SHA to warm (40-char hex)."
        type: string
        required: true
      tag:
        description: "Why we're warming this SHA: lkg | fkb | both | manual."
        type: string
        required: true
      downstreams_json:
        description: 'JSON array of downstream names benefitting from this SHA, e.g. ["physlib","FLT"].'
        type: string
        required: true

permissions:
  contents: read
  id-token: write   # required for OIDC bearer mint in upload_cache

jobs:
  build_and_stage:
    runs-on: [self-hosted, pr]
    outputs:
      status: ${{ steps.write_result.outputs.status }}
    steps:
      # The self-hosted `pr` runner doesn't ship jq; the ubuntu-latest
      # runners used by upload_cache and verify do. linux/amd64-only,
      # which is fine for the `pr` label.
      - name: Install jq
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64 \
            -o "$HOME/.local/bin/jq"
          chmod +x "$HOME/.local/bin/jq"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Clone mathlib at SHA
        env:
          SHA: ${{ inputs.sha }}
        run: |
          git clone --filter=blob:none https://github.com/leanprover-community/mathlib4 mathlib4
          git -C mathlib4 fetch origin "$SHA" --depth 1
          git -C mathlib4 checkout "$SHA"

      - name: Build cache tool
        working-directory: mathlib4
        run: lake build cache

      - name: Probe cache completeness
        id: probe
        working-directory: mathlib4
        continue-on-error: true
        run: |
          lake exe cache get
          lake build --no-build -v Mathlib

      - name: Build Mathlib
        id: build
        if: steps.probe.outcome != 'success'
        working-directory: mathlib4
        continue-on-error: true
        run: lake build Mathlib

      - name: Stage cache
        if: steps.build.outcome == 'success'
        working-directory: mathlib4
        run: lake exe cache stage --staging-dir=../cache-staging

      - name: Bundle cache binary with staging
        if: steps.build.outcome == 'success'
        run: cp mathlib4/.lake/build/bin/cache cache-staging/cache.bin

      - name: Upload staging artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: stage-${{ inputs.sha }}
          path: cache-staging/
          if-no-files-found: error

      - name: Write result
        id: write_result
        if: always()
        env:
          SHA: ${{ inputs.sha }}
          TAG: ${{ inputs.tag }}
          DOWNSTREAMS_JSON: ${{ inputs.downstreams_json }}
          PROBE_OUTCOME: ${{ steps.probe.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        run: |
          if   [ "$PROBE_OUTCOME" = "success" ];   then STATUS=already_warm
          elif [ "$BUILD_OUTCOME" != "success" ];  then STATUS=build_failed
          else                                          STATUS=staged
          fi
          mkdir -p out
          jq -n \
            --arg sha "$SHA" \
            --arg tag "$TAG" \
            --arg status "$STATUS" \
            --argjson downstreams "$DOWNSTREAMS_JSON" \
            '{sha:$sha, tag:$tag, status:$status, downstreams:$downstreams}' \
            > "out/result.json"
          cat out/result.json
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      # Terminal: upload directly as the final result so the orchestrator's
      # summary can read it without further chain stages running.
      - name: Upload final result (terminal)
        if: always() && steps.write_result.outputs.status != 'staged'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: warm-result-${{ inputs.sha }}
          path: out/result.json
          if-no-files-found: error

      # Non-terminal: hand off to upload_cache.
      - name: Upload intermediate result (staged)
        if: steps.write_result.outputs.status == 'staged'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: intermediate-${{ inputs.sha }}
          path: out/result.json
          if-no-files-found: error

  upload_cache:
    needs: build_and_stage
    if: needs.build_and_stage.outputs.status == 'staged'
    runs-on: ubuntu-latest
    # Bind the OIDC subject claim to a GitHub Environment, NOT a branch.
    # The federated credential on the mathlib cache-writer Azure app
    # is configured against
    #   repo:leanprover-community/downstream-reports:environment:cache-warming-token
    # so workflow_dispatch runs from a feature branch can mint the same
    # bearer token. Production runs are still gated to main by the
    # workflow_run filter on the orchestrator workflow.
    environment: cache-warming-token
    outputs:
      status: ${{ steps.write_result.outputs.status }}
    steps:
      - name: Download intermediate result
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: intermediate-${{ inputs.sha }}
          path: prev

      - name: Download staging artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: stage-${{ inputs.sha }}
          path: cache-staging

      - name: Mint Azure cache bearer token
        id: cache_token
        uses: leanprover-community/mathlib-ci/.github/actions/azure-create-cache-token@17db5ff55a65df98d55cbddcc67938f70d10dab2
        with:
          azure-client-id: ${{ secrets.MATHLIB_CACHE_WRITER_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.LPC_AZ_TENANT_ID }}

      - name: Push staged cache to Azure
        id: push
        continue-on-error: true   # capture push_failed before failing the job
        env:
          MATHLIB_CACHE_USE_CLOUDFLARE: "0"
        run: |
          chmod +x cache-staging/cache.bin
          cache-staging/cache.bin put-staged \
            --staging-dir=cache-staging \
            --repo=leanprover-community/mathlib4

      - name: Write result
        id: write_result
        if: always()
        env:
          PUSH_OUTCOME: ${{ steps.push.outcome }}
        run: |
          mkdir -p out
          if [ "$PUSH_OUTCOME" = "success" ]; then
            STATUS=pushed
          else
            STATUS=push_failed
          fi
          jq --arg status "$STATUS" '.status=$status' prev/result.json > out/result.json
          cat out/result.json
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      # Terminal: push_failed becomes the final result.
      - name: Upload final result (push_failed)
        if: always() && steps.write_result.outputs.status == 'push_failed'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: warm-result-${{ inputs.sha }}
          path: out/result.json
          if-no-files-found: error

      # Non-terminal: hand off to verify.
      - name: Upload pushed result
        if: steps.write_result.outputs.status == 'pushed'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pushed-${{ inputs.sha }}
          path: out/result.json
          if-no-files-found: error

      - name: Surface push failure as a job failure
        if: steps.push.outcome == 'failure'
        run: |
          echo "::error::Cache push failed for ${{ inputs.sha }}."
          exit 1

  verify:
    needs: upload_cache
    if: needs.upload_cache.outputs.status == 'pushed'
    runs-on: ubuntu-latest
    steps:
      - name: Download pushed result
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pushed-${{ inputs.sha }}
          path: prev

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Verify cache for SHA
        id: verify
        continue-on-error: true   # capture verify_failed before failing the job
        env:
          SHA: ${{ inputs.sha }}
        run: |
          git clone --filter=blob:none https://github.com/leanprover-community/mathlib4 mathlib4
          git -C mathlib4 fetch origin "$SHA" --depth 1
          git -C mathlib4 checkout "$SHA"
          cd mathlib4
          lake exe cache get
          lake build --no-build --rehash -v Mathlib

      - name: Write final result
        if: always()
        env:
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        run: |
          if [ "$VERIFY_OUTCOME" = "success" ]; then
            STATUS=warmed
          else
            STATUS=verify_failed
          fi
          jq --arg status "$STATUS" '.status=$status' prev/result.json > final.json
          cat final.json

      - name: Upload final result
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: warm-result-${{ inputs.sha }}
          path: final.json
          if-no-files-found: error

      - name: Surface verify failure as a job failure
        if: steps.verify.outcome == 'failure'
        run: |
          echo "::error::Cache verification failed for ${{ inputs.sha }}: not all Mathlib oleans are present after the push."
          exit 1
