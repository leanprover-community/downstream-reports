name: generate-pages

# Triggered on completion of warm-mathlib-cache on main — i.e. after the
# LKG/FKB SHAs reported by mathlib-downstream-report have been confirmed
# warm in mathlib's Azure cache. This keeps the rendered status page
# consistent with lkg/latest.json (both refresh together, both gated on
# the same warming pass), so the page never advertises a SHA whose
# cache is cold.

on:
  workflow_run:
    workflows:
      - warm-mathlib-cache
    types:
      - completed
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  generate-and-deploy:
    # On workflow_run: only deploy when the upstream warm-mathlib-cache
    # run ran on main and succeeded. workflow_dispatch always runs.
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Clone mathlib4 (blobless)
        run: |
          git clone --bare --filter=blob:none --quiet \
            https://github.com/leanprover-community/mathlib4.git \
            /tmp/mathlib4.git

      - name: Generate Pages site
        env:
          GITHUB_TOKEN: ${{ github.token }}
          POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
        run: |
          python3 scripts/generate_site.py \
            --backend sql \
            --upstream-dir /tmp/mathlib4.git \
            --output /tmp/site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: /tmp/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
