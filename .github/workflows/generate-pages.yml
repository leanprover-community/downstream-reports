name: generate-pages

on:
  workflow_run:
    workflows:
      - mathlib-downstream-report
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Clone mathlib4 (blobless)
        run: |
          git clone --bare --filter=blob:none --quiet \
            https://github.com/leanprover-community/mathlib4.git \
            /tmp/mathlib4.git

      - name: Generate Pages site
        env:
          GITHUB_TOKEN: ${{ github.token }}
          POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
        run: |
          python3 scripts/generate_site.py \
            --backend sql \
            --upstream-dir /tmp/mathlib4.git \
            --output /tmp/site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: /tmp/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
