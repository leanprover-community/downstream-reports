name: publish-lkg

# Publishes two per-downstream snapshots to Azure Blob Storage after each
# successful regression report run on main:
#
#   lkg/latest.json  — stable public API for bump actions; carries the LKG /
#                      FKB / release commits per downstream.
#   runs/latest.json — per-downstream latest regression-run metadata (run_id,
#                      run_url, job_url, target_commit, downstream_commit,
#                      outcome, episode_state, timestamps).  Consumed by the
#                      open-incompatibility-issue action and by future tooling that
#                      fetches job logs / the result-<name> artifact.
#
# Both snapshots are read from the database (full accumulated state, not
# just the latest run) and uploaded as publicly-readable JSON files.
#
# Runs only on completion of warm-mathlib-cache on the main branch — that
# is, after the LKG/FKB SHAs reported by mathlib-downstream-report have
# been confirmed warm in mathlib's Azure cache. Gating on warm-mathlib-cache
# (not on the report directly) is what enforces the contract that
# lkg/latest.json never advertises a SHA whose cache is cold. The full
# chain is: mathlib-downstream-report → warm-mathlib-cache → publish-lkg.
#
# Required GitHub configuration (one-time setup):
#   Secrets:   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID, POSTGRES_DSN
#   Variables: AZURE_STORAGE_ACCOUNT, AZURE_STORAGE_CONTAINER

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["warm-mathlib-cache"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write   # Required for Azure OIDC token minting

jobs:
  publish-lkg:
    # On workflow_run: only publish when the upstream warm-mathlib-cache run
    # ran on main and succeeded. A failed warming pass means we cannot
    # promise the SHAs are cache-warm; refuse to refresh the snapshot.
    # On workflow_dispatch: always run (dispatching from main is enforced
    # by the OIDC federated credential).
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Export LKG snapshot
        env:
          POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 scripts/export_lkg_snapshot.py \
            --backend sql \
            --upstream leanprover-community/mathlib4 \
            --inventory ci/inventory/downstreams.json \
            --output /tmp/lkg-snapshot.json

      - name: Export runs snapshot
        env:
          POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 scripts/export_runs_snapshot.py \
            --backend sql \
            --upstream leanprover-community/mathlib4 \
            --inventory ci/inventory/downstreams.json \
            --output /tmp/runs-snapshot.json

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.DOWNSTREAM_REPORTS_WRITER_AZ_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Upload LKG snapshot to Azure Blob Storage
        run: |
          az storage blob upload \
            --account-name '${{ vars.AZURE_STORAGE_ACCOUNT }}' \
            --container-name '${{ vars.AZURE_STORAGE_CONTAINER }}' \
            --name "lkg/latest.json" \
            --file /tmp/lkg-snapshot.json \
            --content-type "application/json" \
            --overwrite \
            --auth-mode login

      - name: Upload runs snapshot to Azure Blob Storage
        run: |
          az storage blob upload \
            --account-name '${{ vars.AZURE_STORAGE_ACCOUNT }}' \
            --container-name '${{ vars.AZURE_STORAGE_CONTAINER }}' \
            --name "runs/latest.json" \
            --file /tmp/runs-snapshot.json \
            --content-type "application/json" \
            --overwrite \
            --auth-mode login
