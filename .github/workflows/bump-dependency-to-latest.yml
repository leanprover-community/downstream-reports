name: bump-dependency-to-latest

# Reusable workflow: bump a Lean downstream's dependency to its current
# last-known-good (LKG) commit, open (or update) a PR, and maintain a
# persistent GitHub issue tracking any active first-known-bad regression.
#
# Wraps bump-to-latest + open-bump-pr + open-incompatibility-issue.
# Intended as the zero-boilerplate option for downstreams that just want
# a scheduled PR and issue — no job structure required.
#
# Minimal calling workflow:
#
#   on:
#     schedule:
#       - cron: "0 18 * * *"
#     workflow_dispatch:
#
#   jobs:
#     bump:
#       uses: leanprover-community/downstream-reports/.github/workflows/bump-dependency-to-latest.yml@main
#       permissions:
#         contents: write
#         pull-requests: write
#         issues: write

on:
  workflow_call:
    inputs:
      branch:
        description: >
          Branch name for the bump PR. Force-pushed on every run so the PR
          stays at a single commit.
        default: 'hopscotch/lkg-bump'
        required: false
        type: string
      base:
        description: >
          Base branch for the PR. Defaults to the repository default branch.
        default: ''
        required: false
        type: string
      labels:
        description: 'Comma-separated labels to apply to the PR (e.g. "dependencies,automated").'
        default: ''
        required: false
        type: string
      dependency-name:
        description: 'Name of the dependency in the lakefile (default: mathlib).'
        default: 'mathlib'
        required: false
        type: string
      hopscotch-version:
        description: 'Hopscotch release tag to download.'
        default: 'v1.4.1'
        required: false
        type: string
      query-type:
        description: >
          Which commit to bump to. One of:
            last-known-good  (default) — the last commit known to build successfully
            first-known-bad            — the first commit known to break the build
        default: 'last-known-good'
        required: false
        type: string
      skip-build:
        description: >
          Set to "true" to skip the build step and only update the dependency pin
          via "lake update". When true, build-failed is always false; the bump
          succeeds as long as "lake update" succeeds.
        default: false
        required: false
        type: boolean
      open-pr:
        description: >
          Set to false to skip opening or updating the bump PR even when the
          dependency was successfully bumped.
        default: true
        required: false
        type: boolean
      open-issue:
        description: >
          Set to false to skip the open-incompatibility-issue job entirely.
          When true (default), a persistent GitHub issue is opened or maintained
          tracking the current first-known-bad regression.
        default: true
        required: false
        type: boolean
    outputs:
      pr-number:
        description: 'PR number. Empty when no bump was needed (skipped or build-failed).'
        value: ${{ jobs.bump.outputs.pr-number }}
      pr-url:
        description: 'PR URL. Empty when no bump was needed (skipped or build-failed).'
        value: ${{ jobs.bump.outputs.pr-url }}
      action:
        description: >-
          "created" (new PR opened), "updated" (existing PR's title/body
          edited after a force-push), "up-to-date" (remote bump branch
          already had an identical tree at HEAD with an open PR — push
          and edit both skipped), or "noop" (nothing to commit).
        value: ${{ jobs.bump.outputs.action }}
      updated:
        description: '"true" if hopscotch successfully bumped the project.'
        value: ${{ jobs.bump.outputs.updated }}
      skipped:
        description: '"true" if the project was already at the target commit.'
        value: ${{ jobs.bump.outputs.skipped }}
      build-failed:
        description: '"true" if hopscotch ran but the build failed at the target commit.'
        value: ${{ jobs.bump.outputs.build-failed }}

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      pr-number:    ${{ steps.open-pr.outputs.pr-number }}
      pr-url:       ${{ steps.open-pr.outputs.pr-url }}
      action:       ${{ steps.open-pr.outputs.action }}
      updated:      ${{ steps.bump.outputs.updated }}
      skipped:      ${{ steps.bump.outputs.skipped }}
      build-failed: ${{ steps.bump.outputs.build-failed }}
    steps:
      - uses: actions/checkout@v6

      - name: Bump to latest
        id: bump
        uses: leanprover-community/downstream-reports/.github/actions/bump-to-latest@main
        with:
          dependency-name:   ${{ inputs.dependency-name }}
          hopscotch-version: ${{ inputs.hopscotch-version }}
          query-type:        ${{ inputs.query-type }}
          skip-build:        ${{ inputs.skip-build }}

      - name: Open or update PR
        id: open-pr
        if: steps.bump.outputs.updated == 'true' && inputs.open-pr
        uses: leanprover-community/downstream-reports/.github/actions/open-bump-pr@main
        with:
          branch:         ${{ inputs.branch }}
          base:           ${{ inputs.base }}
          labels:         ${{ inputs.labels }}
          title:          ${{ steps.bump.outputs.pr-title }}
          message:        ${{ steps.bump.outputs.bump-description }}
          commit-message: ${{ steps.bump.outputs.commit-message }}

  open-issue:
    runs-on: ubuntu-latest
    if: inputs.open-issue
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Open or update incompatibility issue
        uses: leanprover-community/downstream-reports/.github/actions/open-incompatibility-issue@main
