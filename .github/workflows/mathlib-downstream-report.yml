name: mathlib-downstream-report

on:
  schedule:
    - cron: "0 3,15 * * *"
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Upstream ref to test. Defaults to master."
        required: false
        type: string
      downstream:
        description: "Downstream name(s) to test (comma-separated). Defaults to all enabled downstreams."
        required: false
        type: string
      quiet:
        description: "Run the tool with --quiet."
        required: false
        default: true
        type: boolean
      dry_run:
        description: "Use the dry-run backend (no database reads or writes)."
        required: false
        default: false
        type: boolean
      force_rebisect:
        description: "Disable try_skip_known_bad_bisect so the probe re-runs the bisect even when the stored first-known-bad commit is still an ancestor of the target."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: read

# Runs queue rather than cancel each other.  This lets the manifest-watcher
# (.github/workflows/manifest-watcher.yml) safely workflow_dispatch a targeted
# run while a long scheduled run is still in flight without yanking the
# scheduled run out from under itself.  Scheduled runs are 12h apart so
# real overlap is rare; the watcher's ledger and in-flight check prevent
# per-downstream dispatch pile-ups.
concurrency:
  group: mathlib-downstream-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      has_downstreams: ${{ steps.matrix.outputs.has_downstreams }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      upstream_ref: ${{ steps.upstream_ref.outputs.value }}
      dry_run: ${{ steps.dry_run.outputs.value }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      # Dry-run mode skips all database reads and writes, using the dry-run
      # backend which only logs what operations would have been performed.
      # It is always active on non-main branches (to avoid polluting the
      # database during workflow development) and can also be forced on via
      # the dry_run input even when running from main.
      - id: dry_run
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ] || [ "${{ github.ref_name }}" != "main" ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi
      - id: upstream_ref
        env:
          INPUT_UPSTREAM_REF: ${{ inputs.upstream_ref }}
        run: |
          if [ -n "$INPUT_UPSTREAM_REF" ]; then
            echo "value=$INPUT_UPSTREAM_REF" >> "$GITHUB_OUTPUT"
          else
            echo "value=master" >> "$GITHUB_OUTPUT"
          fi
      - id: matrix
        env:
          INPUT_DOWNSTREAM: ${{ inputs.downstream }}
        run: |
          python3 - <<'PY' > matrix.json
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path("ci/inventory/downstreams.json").read_text())
          downstream = os.environ.get("INPUT_DOWNSTREAM", "")
          filter_names = {s.strip() for s in downstream.replace("\n", ",").split(",") if s.strip()} if downstream else set()
          include = [
              item
              for item in payload.get("downstreams", [])
              if item.get("enabled", True) and (not filter_names or item["name"] in filter_names)
          ]
          for item in include:
              item.setdefault("runs_on", ["self-hosted", "pr"])
          print(json.dumps({"include": include}, sort_keys=True))
          PY
          MATRIX_JSON=$(tr -d '\n' < matrix.json)
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
          if [ "$MATRIX_JSON" = '{"include":[]}' ]; then
            echo "has_downstreams=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_downstreams=true" >> "$GITHUB_OUTPUT"
          fi

      # The select matrix's only database read is load_all_statuses — the same
      # query with the same answer for every leg.  Stage it once here and hand
      # it to the legs as an artifact: ~30 legs dialing the Neon pooler on the
      # same cron tick is exactly the connection burst that provokes its
      # cold-start timeouts, so the fan-out never touches the database.
      - name: Stage status snapshot
        if: steps.matrix.outputs.has_downstreams == 'true'
        env:
          # POSTGRES_DSN is intentionally omitted in dry-run mode so that
          # credentials are never present in the environment when not needed.
          POSTGRES_DSN: ${{ steps.dry_run.outputs.value == 'true' && '' || secrets.POSTGRES_DSN }}
          BACKEND: ${{ steps.dry_run.outputs.value == 'true' && 'dry-run' || 'sql' }}
        run: |
          python3 scripts/export_status_snapshot.py \
            --backend "$BACKEND" \
            --workflow regression \
            --upstream leanprover-community/mathlib4 \
            --output-root status-snapshot

      - name: Upload status snapshot
        if: steps.matrix.outputs.has_downstreams == 'true'
        uses: actions/upload-artifact@v7.0.0
        with:
          name: status-snapshot
          path: status-snapshot
          if-no-files-found: error
          # Lets "re-run all jobs" replace a snapshot left behind when the
          # previous attempt's report-job artifact cleanup did not run.
          overwrite: true

  select:
    # Runs on a hosted runner with access to secrets.  Clones repos, reads
    # prior episode state from the status snapshot staged by the plan job
    # (never the database), and computes the bisect window.  Never invokes
    # hopscotch.
    if: needs.plan.outputs.has_downstreams == 'true'
    name: "select: ${{ matrix.name }}"
    needs:
      - plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Download status snapshot
        uses: actions/download-artifact@v8.0.1
        with:
          name: status-snapshot
          path: ${{ runner.temp }}/status-snapshot

      - name: Select validation window
        env:
          DOWNSTREAM_NAME: ${{ matrix.name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_REF: ${{ needs.plan.outputs.upstream_ref }}
          OUTPUT_DIR: ${{ runner.temp }}/artifacts/${{ matrix.name }}
          PYTHONUNBUFFERED: "1"
          # Prior episode state comes from the status snapshot staged by the
          # plan job; select legs hold no database credentials.
          STATE_ROOT: ${{ runner.temp }}/status-snapshot
          WORKDIR: ${{ runner.temp }}/downstream-regression
        run: |
          python3 -u scripts/select_downstream_regression_window.py \
            --inventory ci/inventory/downstreams.json \
            --backend filesystem \
            --state-root "$STATE_ROOT" \
            --workflow regression \
            --upstream leanprover-community/mathlib4 \
            --downstream "$DOWNSTREAM_NAME" \
            --upstream-ref "$UPSTREAM_REF" \
            --workdir "$WORKDIR" \
            --output-dir "$OUTPUT_DIR"

      - name: Upload selection artifact
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: selection-${{ matrix.name }}
          path: ${{ runner.temp }}/artifacts/${{ matrix.name }}
          if-no-files-found: error

  probe:
    # Has no privilege-bearing CI secrets in scope.  Downloads selection.json,
    # runs hopscotch (HEAD probe + optional bisect), and uploads the final
    # result artifact.  GITHUB_TOKEN is exposed to hopscotch for authenticated
    # commit-range API calls and is scoped to `contents: read` at the job
    # level so the worst-case blast radius if hopscotch's env scrub ever
    # regressed is read-only access to public repository contents.
    #
    # Runner labels come from `runs_on` on the matrix entry, sourced from
    # the inventory (default `[self-hosted, pr]`).  Downstreams whose build
    # needs a stock image override with `runs_on: ["ubuntu-latest"]`.
    #
    # `!cancelled()` (rather than the implicit `success()`) is deliberate: the
    # `select` matrix has `fail-fast: false`, but a failure in *any* select leg
    # still marks the whole `select` job as failed, which under `success()`
    # would skip the *entire* probe matrix.  We instead let every probe leg run
    # and download its own `selection-<name>` artifact; a leg whose select
    # failed simply fails at download (fail-fast: false keeps the rest going),
    # so one downstream's transient blip costs one probe, not all of them.
    if: ${{ !cancelled() && needs.plan.outputs.has_downstreams == 'true' }}
    name: "probe: ${{ matrix.name }}"
    needs:
      - plan
      - select
    permissions:
      contents: read
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Install Lean
        run: |
          # elan-init.sh is fetched from a well-known URL on every run. This is
          # intentional: the self-hosted runners are ephemeral and there is no
          # pinned elan release to maintain. A compromised elan release would be
          # quickly noticed by the community; the risk is accepted.
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Download hopscotch binary
        # Hopscotch v1.5.0+ strips GITHUB_TOKEN from every `lake` / `git`
        # child env via `Hopscotch.secretScrubEnv`.  The "Run probe" step
        # below relies on that guarantee to authenticate API calls without
        # leaking the token into untrusted lake builds.  Keep this URL at
        # v1.5.0 or later; lowering it requires also removing GITHUB_TOKEN
        # from the probe step's env: block.
        run: |
          mkdir -p "${{ runner.temp }}/tool-bin"
          curl -L \
            https://github.com/leanprover-community/hopscotch/releases/download/v1.5.0/hopscotch-linux-x86_64 \
            -o "${{ runner.temp }}/tool-bin/hopscotch"
          chmod +x "${{ runner.temp }}/tool-bin/hopscotch"

      - name: Download selection artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: selection-${{ matrix.name }}
          path: ${{ runner.temp }}/artifacts/${{ matrix.name }}

      - name: Run probe
        # No privilege-bearing secrets in env — POSTGRES_DSN, ZULIP_*, and
        # similar are absent so hopscotch and any lake build it spawns
        # cannot read them.  GITHUB_TOKEN is intentionally exposed so
        # hopscotch can authenticate commit-range API calls against
        # mathlib4 (the unauthenticated 60-req/h limit is too tight);
        # hopscotch strips it from the env of every `lake` / `git` child
        # process it spawns.  Requires hopscotch >= v1.5.0 (env
        # isolation; see `Hopscotch.secretScrubEnv` in the hopscotch repo).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT_DIR: ${{ runner.temp }}/artifacts/${{ matrix.name }}
          PYTHONUNBUFFERED: "1"
          QUIET: ${{ inputs.quiet }}
          FORCE_REBISECT: ${{ inputs.force_rebisect }}
          WORKDIR: ${{ runner.temp }}/downstream-regression
        run: |
          QUIET_FLAG=""
          if [ "$QUIET" = "true" ]; then
            QUIET_FLAG="--quiet"
          fi
          SKIP_FLAG=""
          if [ "$FORCE_REBISECT" = "true" ]; then
            SKIP_FLAG="--no-skip-known-bad-bisect"
          fi
          python3 -u scripts/probe_downstream_regression_window.py \
            --selection "$OUTPUT_DIR/selection.json" \
            --workdir "$WORKDIR" \
            --output-dir "$OUTPUT_DIR" \
            $QUIET_FLAG \
            $SKIP_FLAG \
            --tool-exe "${{ runner.temp }}/tool-bin/hopscotch"

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: result-${{ matrix.name }}
          path: ${{ runner.temp }}/artifacts/${{ matrix.name }}
          if-no-files-found: error

      - name: Stage culprit log
        if: always()
        env:
          OUTPUT_DIR: ${{ runner.temp }}/artifacts/${{ matrix.name }}
        run: bash .github/scripts/stage-culprit-log.sh

      # Separate artifact so consumers (issues, PRs, the website) can deep-link
      # to just the failing-commit build log instead of the full result-* zip.
      # Skipped automatically (if-no-files-found: ignore) on passing runs.
      - name: Upload culprit log artifact
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: culprit-log-${{ matrix.name }}
          path: ${{ runner.temp }}/artifacts/${{ matrix.name }}/culprit.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Print validation summary
        if: always()
        env:
          OUTPUT_DIR: ${{ runner.temp }}/artifacts/${{ matrix.name }}
          UPSTREAM_REF: ${{ needs.plan.outputs.upstream_ref }}
        run: |
          python3 scripts/summarize_single_result.py \
            --result-dir "$OUTPUT_DIR" \
            --upstream-ref "$UPSTREAM_REF"

  report:
    if: always() && needs.plan.outputs.has_downstreams == 'true'
    needs:
      - plan
      - probe
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
      
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - uses: actions/download-artifact@v8.0.1
        with:
          path: downloaded-results
          pattern: result-*
      - name: Collect validate job URLs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json, os, subprocess
          data = json.loads(subprocess.check_output([
              "gh", "api",
              f"repos/{os.environ['GH_REPO']}/actions/runs/{os.environ['RUN_ID']}/jobs?per_page=100",
          ]))
          urls = {}
          for job in data.get("jobs", []):
              name = job["name"]
              if name.startswith("probe: "):
                  downstream = name[len("probe: "):]
                  urls[downstream] = {
                      "job_id": str(job["id"]),
                      "url": job["html_url"],
                      "started_at": job.get("started_at"),
                      "finished_at": job.get("completed_at"),
                      "conclusion": job.get("conclusion"),
                  }
          with open("job_urls.json", "w") as f:
              json.dump(urls, f)
          PY

      # Resolve culprit-log-<name> artifacts to deep-link download URLs.
      # The generated `<repo>/actions/runs/<run-id>/artifacts/<artifact-id>`
      # URL initiates a zip download for any logged-in user.  Passing runs
      # produce no culprit log; missing artifacts simply omit that key.
      - name: Collect culprit-log artifact URLs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_SERVER: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json, os, subprocess
          repo = os.environ["GH_REPO"]
          server = os.environ["GH_SERVER"]
          run_id = os.environ["RUN_ID"]
          data = json.loads(subprocess.check_output([
              "gh", "api", "--paginate",
              f"repos/{repo}/actions/runs/{run_id}/artifacts?per_page=100",
          ]))
          urls: dict[str, str] = {}
          for art in data.get("artifacts", []):
              name = art.get("name") or ""
              prefix = "culprit-log-"
              if name.startswith(prefix):
                  downstream = name[len(prefix):]
                  urls[downstream] = (
                      f"{server}/{repo}/actions/runs/{run_id}/artifacts/{art['id']}"
                  )
          with open("culprit_log_urls.json", "w") as f:
              json.dump(urls, f)
          print(f"Resolved {len(urls)} culprit-log artifact URL(s)")
          PY
      - name: Aggregate results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # POSTGRES_DSN is intentionally omitted in dry-run mode so that
          # credentials are never present in the environment when not needed.
          POSTGRES_DSN: ${{ needs.plan.outputs.dry_run == 'true' && '' || secrets.POSTGRES_DSN }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          UPSTREAM_REF: ${{ needs.plan.outputs.upstream_ref }}
          BACKEND: ${{ needs.plan.outputs.dry_run == 'true' && 'dry-run' || 'sql' }}
        run: |
          python3 scripts/aggregate_results.py \
            --results-dir downloaded-results \
            --backend "$BACKEND" \
            --workflow regression \
            --upstream leanprover-community/mathlib4 \
            --run-id "$RUN_ID" \
            --run-url "$RUN_URL" \
            --upstream-ref "$UPSTREAM_REF" \
            --job-urls job_urls.json \
            --culprit-log-artifact-urls culprit_log_urls.json \
            --report-output /tmp/report.md \
            --alert-output /tmp/alert-payload.json
          cat /tmp/report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload alert payload
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: alert-payload
          path: /tmp/alert-payload.json
          if-no-files-found: ignore

      - name: Delete consumed artifacts
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          gh api --paginate \
            "repos/$GH_REPO/actions/runs/$RUN_ID/artifacts" \
            --jq '.artifacts[] | select(.name | test("^selection-|^status-snapshot$")) | "\(.id) \(.name)"' \
          | while IFS=" " read -r id name; do
              gh api -X DELETE "repos/$GH_REPO/actions/artifacts/$id" \
                && echo "deleted $name" \
                || echo "warning: could not delete $name ($id)"
            done || true

  alert:
    if: always() && needs.plan.outputs.has_downstreams == 'true'
    needs:
      - plan
      - report
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - uses: actions/download-artifact@v8.0.1
        id: download
        continue-on-error: true
        with:
          name: alert-payload
          path: alert-payload

      - name: Send alerts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZULIP_EMAIL: ${{ vars.ZULIP_EMAIL }}
          ZULIP_API_KEY: ${{ secrets.ZULIP_API_KEY }}
          BACKEND: ${{ needs.plan.outputs.dry_run == 'true' && 'dry-run' || 'zulip' }}
        run: |
          python3 scripts/send_alerts.py \
            --alert-payload alert-payload/alert-payload.json \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --stream "Hopscotch" \
            --topic "Downstream alerts" \
            --backend "$BACKEND"

      - name: Delete alert payload
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          ART_ID=$(gh api --paginate \
            "repos/$GH_REPO/actions/runs/$RUN_ID/artifacts?per_page=100" \
            --jq '.artifacts[] | select(.name == "alert-payload") | .id')
          if [ -n "$ART_ID" ]; then
            gh api -X DELETE "repos/$GH_REPO/actions/artifacts/$ART_ID" \
              && echo "deleted alert-payload ($ART_ID)" \
              || echo "warning: could not delete alert-payload ($ART_ID)"
          fi
