name: mathlib-downstream-summary

on:
  workflow_run:
    workflows: ["mathlib-downstream-report"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      stream:
        description: "Zulip stream to post the summary to."
        required: false
        default: "hopscotch"
        type: string
      topic:
        description: "Zulip topic to post the summary to."
        required: false
        default: "Downstream reports"
        type: string
      dry_run:
        description: "Use the dry-run sender (no actual Zulip message)."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  summary:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Send summary
        env:
          POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
          ZULIP_EMAIL: ${{ vars.ZULIP_EMAIL }}
          ZULIP_API_KEY: ${{ secrets.ZULIP_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZULIP_STREAM: ${{ inputs.stream || 'hopscotch' }}
          ZULIP_TOPIC: ${{ inputs.topic || 'Downstream reports' }}
        run: |
          # `github.event.workflow_run.head_branch` reflects the branch of the
          # upstream `mathlib-downstream-report` run that triggered us; the
          # `github.ref_name` fallback covers direct `workflow_dispatch`, where
          # the upstream-run field is empty.  Without the fallback, a chained
          # run from a non-`main` upstream branch would post to Zulip because
          # `workflow_run`-triggered workflows always execute from `main`.
          TRIGGER_BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          BACKEND="zulip"
          if [ "${{ inputs.dry_run }}" = "true" ] || [ "$TRIGGER_BRANCH" != "main" ]; then
            BACKEND="dry-run"
          fi
          python3 scripts/send_summary.py \
            --inventory ci/inventory/downstreams.json \
            --stream "$ZULIP_STREAM" \
            --topic  "$ZULIP_TOPIC" \
            --backend "$BACKEND"
