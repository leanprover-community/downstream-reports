name: open-incompatibility-issue

# Reusable workflow: open or maintain a single persistent GitHub issue
# describing the current regression (first-known-bad commit) affecting
# a downstream project.  Closes the issue when the regression clears.
#
# Thin wrapper around the open-incompatibility-issue composite action.  Intended as
# the zero-boilerplate option for downstreams that just want a scheduled
# check — no job structure required.
#
# Minimal calling workflow:
#
#   on:
#     schedule:
#       - cron: "0 19 * * *"
#     workflow_dispatch:
#
#   jobs:
#     regression-issue:
#       uses: leanprover-community/downstream-reports/.github/workflows/open-incompatibility-issue.yml@main
#       permissions:
#         issues: write

on:
  workflow_call:
    inputs:
      downstream:
        description: >
          Downstream to look up.  Name key (e.g. "physlib") or repo slug
          (e.g. "leanprover-community/physlib").  Defaults to the caller's
          repository.
        default: ''
        required: false
        type: string
      upstream:
        description: >
          Upstream repository slug used to fetch commit metadata for the
          FKB/LKG commits.  Must match the upstream field in the snapshot.
        default: 'leanprover-community/mathlib4'
        required: false
        type: string
      label:
        description: >
          Label used to identify the persistent issue.  Created if missing
          in the consuming repo.
        default: 'dependency-incompatibility'
        required: false
        type: string
      title:
        description: >
          Full issue title.  When empty, the action auto-generates one of
          the form "Bumping <dep-name> to <fkb-short> would break the build".
        default: ''
        required: false
        type: string
      close-on-resolve:
        description: >
          When the snapshot clears the first-known-bad, close the open
          tracking issue (if any) with a resolution comment.
        default: 'true'
        required: false
        type: string
    outputs:
      issue-number:
        description: 'Issue number (empty when action=noop).'
        value: ${{ jobs.issue.outputs.issue-number }}
      issue-url:
        description: 'Issue URL (empty when action=noop).'
        value: ${{ jobs.issue.outputs.issue-url }}
      action:
        description: '"created", "updated", "closed", or "noop".'
        value: ${{ jobs.issue.outputs.action }}

jobs:
  issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    outputs:
      issue-number: ${{ steps.open.outputs.issue-number }}
      issue-url:    ${{ steps.open.outputs.issue-url }}
      action:       ${{ steps.open.outputs.action }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Open or maintain incompatibility issue
        id: open
        uses: leanprover-community/downstream-reports/.github/actions/open-incompatibility-issue@main
        with:
          downstream:       ${{ inputs.downstream == '' && github.repository || inputs.downstream }}
          upstream:         ${{ inputs.upstream }}
          label:            ${{ inputs.label }}
          title:            ${{ inputs.title }}
          close-on-resolve: ${{ inputs.close-on-resolve }}
