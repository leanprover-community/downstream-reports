name: mathlib-downstream-ondemand

on:
  workflow_dispatch:
    inputs:
      downstream:
        description: "Downstream name to test. If empty, runs all with a configured bumping_branch."
        required: false
        type: string
      branch:
        description: "Branch to test (requires downstream). Overrides the inventory bumping_branch."
        required: false
        type: string
      force:
        description: "Skip dedup check (re-test even if branch HEAD unchanged)."
        required: false
        default: false
        type: boolean
      quiet:
        description: "Run the tool with --quiet."
        required: false
        default: true
        type: boolean
      dry_run:
        description: "Use the dry-run backend (no database reads or writes)."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: read

concurrency:
  group: mathlib-downstream-ondemand-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      has_downstreams: ${{ steps.matrix.outputs.has_downstreams }}
      has_skipped: ${{ steps.matrix.outputs.has_skipped }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      dry_run: ${{ steps.dry_run.outputs.value }}
    steps:
      - uses: actions/checkout@v6

      - id: dry_run
        name: Choose dry-run flag
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ] || [ "${{ github.ref_name }}" != "main" ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - id: matrix
        name: Generate job matrix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_DOWNSTREAM: ${{ inputs.downstream }}
          INPUT_BRANCH: ${{ inputs.branch }}
          INPUT_FORCE: ${{ inputs.force }}
          POSTGRES_DSN: ${{ steps.dry_run.outputs.value == 'true' && '' || secrets.POSTGRES_DSN }}
          BACKEND: ${{ steps.dry_run.outputs.value == 'true' && 'dry-run' || 'sql' }}
        run: |
          FORCE_FLAG=""
          if [ "$INPUT_FORCE" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          DOWNSTREAM_FLAG=""
          if [ -n "$INPUT_DOWNSTREAM" ]; then
            DOWNSTREAM_FLAG="--downstream $INPUT_DOWNSTREAM"
          fi
          BRANCH_FLAG=""
          if [ -n "$INPUT_BRANCH" ]; then
            BRANCH_FLAG="--branch $INPUT_BRANCH"
          fi
          python3 scripts/select_ondemand_plan.py \
            --inventory ci/inventory/downstreams.json \
            --backend "$BACKEND" \
            --output matrix.json \
            --skipped-output skipped.json \
            $DOWNSTREAM_FLAG \
            $BRANCH_FLAG \
            $FORCE_FLAG

          cat matrix.json
          if [ ! -s matrix.json ]; then
            echo "No downstreams selected"
            echo "has_downstreams=false" >> "$GITHUB_OUTPUT"
          else
            MATRIX_JSON=$(tr -d '\n' < matrix.json)
            echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"

            if echo "$MATRIX_JSON" | jq -e '.include | length > 0' >/dev/null; then
              echo "has_downstreams=true" >> "$GITHUB_OUTPUT"
            else
              echo "No downstreams selected"
              echo "has_downstreams=false" >> "$GITHUB_OUTPUT"
            fi
          fi

          if [ -s skipped.json ] && [ "$(cat skipped.json)" != "[]" ]; then
            echo "has_skipped=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_skipped=false" >> "$GITHUB_OUTPUT"
          fi

      # The select matrix's only database read is load_all_statuses — the same
      # query with the same answer for every leg.  Stage it once here and hand
      # it to the legs as an artifact so the fan-out never dials the database
      # (parallel connection bursts provoke Neon pooler cold-start timeouts).
      - name: Stage status snapshot
        if: steps.matrix.outputs.has_downstreams == 'true'
        env:
          POSTGRES_DSN: ${{ steps.dry_run.outputs.value == 'true' && '' || secrets.POSTGRES_DSN }}
          BACKEND: ${{ steps.dry_run.outputs.value == 'true' && 'dry-run' || 'sql' }}
        run: |
          python3 scripts/export_status_snapshot.py \
            --backend "$BACKEND" \
            --workflow ondemand \
            --upstream leanprover-community/mathlib4 \
            --output status-snapshot/status.json

      - name: Upload status snapshot
        if: steps.matrix.outputs.has_downstreams == 'true'
        uses: actions/upload-artifact@v7.0.0
        with:
          name: status-snapshot
          path: status-snapshot
          if-no-files-found: error
          # Lets "re-run all jobs" replace a snapshot left behind when the
          # previous attempt's report-job artifact cleanup did not run.
          overwrite: true

      - name: Upload skipped downstreams
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: skipped-downstreams
          path: skipped.json
          if-no-files-found: ignore

  select:
    # Runs on a hosted runner with access to secrets.  Clones repos, reads
    # prior episode state from the status snapshot staged by the plan job
    # (never the database), and computes the bisect window.  Never invokes
    # hopscotch.
    if: ${{ needs.plan.outputs.has_downstreams == 'true' }}
    name: "select: ${{ matrix.name }}"
    needs:
      - plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Download status snapshot
        uses: actions/download-artifact@v8.0.1
        with:
          name: status-snapshot
          path: ${{ runner.temp }}/status-snapshot

      - name: Select validation window
        env:
          DOWNSTREAM_NAME: ${{ matrix.name }}
          BUMPING_BRANCH: ${{ matrix.bumping_branch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT_DIR: ${{ runner.temp }}/artifacts/${{ matrix.name }}
          PYTHONUNBUFFERED: "1"
          # Prior episode state comes from the status snapshot staged by the
          # plan job; select legs hold no database credentials.
          STATUS_SNAPSHOT: ${{ runner.temp }}/status-snapshot/status.json
          WORKDIR: ${{ runner.temp }}/downstream-regression
        run: |
          python3 -u scripts/select_ondemand_window.py \
            --inventory ci/inventory/downstreams.json \
            --status-snapshot "$STATUS_SNAPSHOT" \
            --workflow ondemand \
            --downstream "$DOWNSTREAM_NAME" \
            --branch-override "$BUMPING_BRANCH" \
            --workdir "$WORKDIR" \
            --output-dir "$OUTPUT_DIR"

      - name: Upload selection artifact
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: selection-${{ matrix.name }}
          path: ${{ runner.temp }}/artifacts/${{ matrix.name }}
          if-no-files-found: error

  probe:
    # Runs on an ephemeral self-hosted runner with no privilege-bearing
    # CI secrets in scope.  Downloads selection.json, runs hopscotch
    # (HEAD probe + optional bisect), and uploads the final result
    # artifact.  GITHUB_TOKEN is exposed to hopscotch for authenticated
    # commit-range API calls and is scoped to `contents: read` at the
    # job level so the worst-case blast radius if hopscotch's env scrub
    # ever regressed is read-only access to public repository contents.
    #
    # `!cancelled()` (rather than the implicit `success()`) is deliberate: the
    # `select` matrix has `fail-fast: false`, but a failure in *any* select leg
    # still marks the whole `select` job as failed, which under `success()`
    # would skip the *entire* probe matrix.  We instead let every probe leg run
    # and download its own `selection-<name>` artifact; a leg whose select
    # failed simply fails at download (fail-fast: false keeps the rest going),
    # so one downstream's transient blip costs one probe, not all of them.
    if: ${{ !cancelled() && needs.plan.outputs.has_downstreams == 'true' }}
    name: "probe: ${{ matrix.name }}"
    needs:
      - plan
      - select
    permissions:
      contents: read
    # Runner labels come from `runs_on` on the matrix entry, sourced from
    # the inventory (default `[self-hosted, pr]`).  Downstreams whose build
    # needs a stock image override with `runs_on: ["ubuntu-latest"]`.
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Install Lean
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Download hopscotch binary
        # Hopscotch v1.5.0+ strips GITHUB_TOKEN from every `lake` / `git`
        # child env via `Hopscotch.secretScrubEnv`.  The "Run probe" step
        # below relies on that guarantee to authenticate API calls without
        # leaking the token into untrusted lake builds.  Keep this URL at
        # v1.5.0 or later; lowering it requires also removing GITHUB_TOKEN
        # from the probe step's env: block.
        run: |
          mkdir -p "${{ runner.temp }}/tool-bin"
          curl -L \
            https://github.com/leanprover-community/hopscotch/releases/download/v1.5.0/hopscotch-linux-x86_64 \
            -o "${{ runner.temp }}/tool-bin/hopscotch"
          chmod +x "${{ runner.temp }}/tool-bin/hopscotch"

      - name: Download selection artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: selection-${{ matrix.name }}
          path: ${{ runner.temp }}/artifacts/${{ matrix.name }}

      - name: Run probe
        # No privilege-bearing secrets in env — POSTGRES_DSN, ZULIP_*, and
        # similar are absent so hopscotch and any lake build it spawns
        # cannot read them.  GITHUB_TOKEN is intentionally exposed so
        # hopscotch can authenticate commit-range API calls against
        # mathlib4 (the unauthenticated 60-req/h limit is too tight);
        # hopscotch strips it from the env of every `lake` / `git` child
        # process it spawns.  Requires hopscotch >= v1.5.0 (env
        # isolation; see `Hopscotch.secretScrubEnv` in the hopscotch repo).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT_DIR: ${{ runner.temp }}/artifacts/${{ matrix.name }}
          PYTHONUNBUFFERED: "1"
          QUIET: ${{ inputs.quiet }}
          WORKDIR: ${{ runner.temp }}/downstream-regression
        run: |
          QUIET_FLAG=""
          if [ "$QUIET" = "true" ]; then
            QUIET_FLAG="--quiet"
          fi
          python3 -u scripts/probe_downstream_regression_window.py \
            --selection "$OUTPUT_DIR/selection.json" \
            --workdir "$WORKDIR" \
            --output-dir "$OUTPUT_DIR" \
            $QUIET_FLAG \
            --tool-exe "${{ runner.temp }}/tool-bin/hopscotch"

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: result-${{ matrix.name }}
          path: ${{ runner.temp }}/artifacts/${{ matrix.name }}
          if-no-files-found: error

      - name: Stage culprit log
        if: always()
        env:
          OUTPUT_DIR: ${{ runner.temp }}/artifacts/${{ matrix.name }}
        run: bash .github/scripts/stage-culprit-log.sh

      - name: Upload culprit log artifact
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: culprit-log-${{ matrix.name }}
          path: ${{ runner.temp }}/artifacts/${{ matrix.name }}/culprit.log
          if-no-files-found: ignore
          retention-days: 365

      - name: Print validation summary
        if: always()
        env:
          OUTPUT_DIR: ${{ runner.temp }}/artifacts/${{ matrix.name }}
        run: |
          python3 scripts/summarize_single_result.py \
            --result-dir "$OUTPUT_DIR"

  report:
    if: "!cancelled() && (needs.plan.outputs.has_downstreams == 'true' || needs.plan.outputs.has_skipped == 'true')"
    needs:
      - plan
      - probe
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - uses: actions/download-artifact@v8.0.1
        continue-on-error: true
        with:
          path: downloaded-results
          pattern: result-*

      - uses: actions/download-artifact@v8.0.1
        continue-on-error: true
        with:
          name: skipped-downstreams
          path: skipped-data

      - name: Collect probe job URLs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json, os, subprocess
          data = json.loads(subprocess.check_output([
              "gh", "api",
              f"repos/{os.environ['GH_REPO']}/actions/runs/{os.environ['RUN_ID']}/jobs?per_page=100",
          ]))
          urls = {}
          for job in data.get("jobs", []):
              name = job["name"]
              if name.startswith("probe: "):
                  downstream = name[len("probe: "):]
                  urls[downstream] = {
                      "job_id": str(job["id"]),
                      "url": job["html_url"],
                      "started_at": job.get("started_at"),
                      "finished_at": job.get("completed_at"),
                      "conclusion": job.get("conclusion"),
                  }
          with open("job_urls.json", "w") as f:
              json.dump(urls, f)
          PY

      - name: Collect culprit-log artifact URLs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_SERVER: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json, os, subprocess
          repo = os.environ["GH_REPO"]
          server = os.environ["GH_SERVER"]
          run_id = os.environ["RUN_ID"]
          data = json.loads(subprocess.check_output([
              "gh", "api", "--paginate",
              f"repos/{repo}/actions/runs/{run_id}/artifacts?per_page=100",
          ]))
          urls: dict[str, str] = {}
          for art in data.get("artifacts", []):
              name = art.get("name") or ""
              prefix = "culprit-log-"
              if name.startswith(prefix):
                  downstream = name[len(prefix):]
                  urls[downstream] = (
                      f"{server}/{repo}/actions/runs/{run_id}/artifacts/{art['id']}"
                  )
          with open("culprit_log_urls.json", "w") as f:
              json.dump(urls, f)
          print(f"Resolved {len(urls)} culprit-log artifact URL(s)")
          PY

      - name: Aggregate results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POSTGRES_DSN: ${{ needs.plan.outputs.dry_run == 'true' && '' || secrets.POSTGRES_DSN }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BACKEND: ${{ needs.plan.outputs.dry_run == 'true' && 'dry-run' || 'sql' }}
        run: |
          SKIPPED_FLAG=""
          if [ -f skipped-data/skipped.json ]; then
            SKIPPED_FLAG="--skipped skipped-data/skipped.json"
          fi
          python3 scripts/aggregate_results.py \
            --results-dir downloaded-results \
            --backend "$BACKEND" \
            --workflow ondemand \
            --upstream leanprover-community/mathlib4 \
            --run-id "$RUN_ID" \
            --run-url "$RUN_URL" \
            --upstream-ref "ondemand" \
            --job-urls job_urls.json \
            --culprit-log-artifact-urls culprit_log_urls.json \
            --report-output /tmp/report.md \
            --alert-output /tmp/alert-payload.json \
            $SKIPPED_FLAG
          cat /tmp/report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload alert payload
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: alert-payload
          path: /tmp/alert-payload.json
          if-no-files-found: ignore

      - name: Delete consumed artifacts
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          gh api --paginate \
            "repos/$GH_REPO/actions/runs/$RUN_ID/artifacts" \
            --jq '.artifacts[] | select(.name | test("^selection-|^skipped-downstreams$|^status-snapshot$")) | "\(.id) \(.name)"' \
          | while IFS=" " read -r id name; do
              gh api -X DELETE "repos/$GH_REPO/actions/artifacts/$id" \
                && echo "deleted $name" \
                || echo "warning: could not delete $name ($id)"
            done || true

  alert:
    if: "!cancelled() && needs.report.result == 'success' && (needs.plan.outputs.has_downstreams == 'true' || needs.plan.outputs.has_skipped == 'true')"
    needs:
      - plan
      - report
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - uses: actions/download-artifact@v8.0.1
        id: download
        continue-on-error: true
        with:
          name: alert-payload
          path: alert-payload

      - name: Send alerts
        env:
          ZULIP_EMAIL: ${{ vars.ZULIP_EMAIL }}
          ZULIP_API_KEY: ${{ secrets.ZULIP_API_KEY }}
          BACKEND: ${{ needs.plan.outputs.dry_run == 'true' && 'dry-run' || 'zulip' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/send_alerts.py \
            --alert-payload alert-payload/alert-payload.json \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --stream "Hopscotch" \
            --topic "On demand runs" \
            --backend "$BACKEND" \
            --workflow ondemand

      - name: Delete alert payload
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          ART_ID=$(gh api --paginate \
            "repos/$GH_REPO/actions/runs/$RUN_ID/artifacts?per_page=100" \
            --jq '.artifacts[] | select(.name == "alert-payload") | .id')
          if [ -n "$ART_ID" ]; then
            gh api -X DELETE "repos/$GH_REPO/actions/artifacts/$ART_ID" \
              && echo "deleted alert-payload ($ART_ID)" \
              || echo "warning: could not delete alert-payload ($ART_ID)"
          fi
