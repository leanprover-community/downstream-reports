name: mathlib-pr-validation

# Runs the per-PR downstream validation triggered by `!downstream-check` on a
# mathlib4 PR. Dispatched from `mathlib4/.github/workflows/pr_check_downstream.yml`
# via a GitHub App token. See `docs/internal/pr-validation-workflow.md`.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "mathlib4 PR number."
        required: true
        type: string
      merge_sha:
        description: >-
          Resolved SHA of refs/pull/N/merge (a.k.a. the PR API's
          merge_commit_sha). The ref lives on leanprover-community/mathlib4
          even when the PR was opened from a fork, so no head-repo input
          is needed; the merge commit's two parents identify the PR's
          base and head.
        required: true
        type: string
      downstreams:
        description: >-
          Comma-separated `<name-or-slug>[@<rev>] [--merge-branch]`
          entries. Each entry is independent — LKG is the default mode;
          `--merge-branch` flips that single entry to merge mode.
          `<name-or-slug>` accepts the inventory short name or the
          downstream's `owner/repo` slug. See
          docs/internal/pr-validation-workflow.md.
        required: true
        type: string
      post_results:
        description: "Post the dispatch-level result comment back on the mathlib4 PR. Set to false to skip the App-token + comment step (useful for testing before the App is wired up)."
        required: false
        default: true
        type: boolean
      triggered_by:
        description: >-
          GitHub login of the user who dispatched this validation. When
          set, the dispatch-level result comment leads with `_Requested
          by @<user>._` so they get a single notification when the run
          finishes.
        required: false
        default: ''
        type: string

permissions:
  contents: read
  actions: read
  id-token: write   # required for the Azure Key Vault token mint in `report`

concurrency:
  # Serialize all runs for the same PR — re-dispatches (same merge SHA, or a
  # new push that produced a different merge SHA) queue behind the running
  # one rather than cancel it. Each individual run takes long enough on the
  # self-hosted `pr` pool that finishing what we started is almost always
  # cheaper than discarding it; if a stale build is no longer interesting
  # the dispatcher can still cancel it manually.
  group: mathlib-pr-validation-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_downstreams: ${{ steps.plan.outputs.has_downstreams }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - id: plan
        name: Build job matrix
        env:
          INPUT_DOWNSTREAMS: ${{ inputs.downstreams }}
        run: |
          python3 scripts/pr_validation/build_matrix.py \
            --inventory ci/inventory/downstreams.json \
            --names "$INPUT_DOWNSTREAMS" \
            --output matrix.json
          cat matrix.json
          MATRIX_JSON=$(tr -d '\n' < matrix.json)
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
          if echo "$MATRIX_JSON" | jq -e '.include | length > 0' >/dev/null; then
            echo "has_downstreams=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_downstreams=false" >> "$GITHUB_OUTPUT"
          fi

  validate:
    if: ${{ needs.plan.outputs.has_downstreams == 'true' }}
    needs: plan
    # The display name encodes (name, rev_slug, mode) so two entries that
    # differ only in rev or mode show up as distinct rows in the workflow
    # UI. `rev_slug` is `default` when no `@<rev>` was given (see
    # build_matrix.py); we elide it from the title in that common case to
    # keep the row name compact.
    name: >-
      validate: ${{ matrix.name
        }}${{ matrix.rev_slug != 'default' && format('@{0}', matrix.rev_slug) || ''
        }} [${{ matrix.mode }}]
    # Self-hosted runner without CI secrets in scope: the validate job
    # builds arbitrary mathlib4 trees (the PR's would-be-merged commit, or
    # the PR's commits cherry-picked onto a downstream's LKG) and runs
    # `lake build` on a downstream, so it must not see POSTGRES_DSN or any
    # other regression-side secrets. The `pr` label gates this off the
    # main regression-runner pool.
    runs-on: [self-hosted, pr]
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    timeout-minutes: ${{ fromJSON(vars.PR_VALIDATION_TIMEOUT_MINUTES || '90') }}
    steps:
      - uses: actions/checkout@v6   # hopscotch-reports itself, for scripts

      - name: Install Lean (elan)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Build / fetch lakedit
        env:
          HOPSCOTCH_REF: ${{ vars.HOPSCOTCH_REF || 'v1.5.0' }}
          TOOL_BIN: ${{ runner.temp }}/tool-bin
        run: bash scripts/pr_validation/install_lakedit.sh

      - name: Run validation
        # Every matrix / inputs value flows into the script via `env:`
        # rather than `${{ … }}` expansion inside `run:`. GitHub renders
        # `${{ … }}` directly into the shell script before bash sees it,
        # so a value containing `$(...)` or backticks would execute as
        # command substitution even inside double quotes. Binding via
        # `env:` makes bash read the value as a literal string at run
        # time with no re-evaluation. `matrix.rev` in particular is the
        # verbatim refspec the user typed in the `!downstream-check`
        # comment, with only grammar validation upstream.
        #
        # `matrix.rev` / `matrix.lkg_commit` / `matrix.fkb_commit` are
        # `''` when build_matrix.py didn't set them (no `@<rev>` from
        # the user, merge mode, no recorded master regression).
        # validate.py accepts empty strings and falls back appropriately:
        # --downstream-rev empty → use --default-branch; --lkg-commit
        # empty is rejected by Config.from_args when --mode lkg.
        # --requested-name carries the literal user-typed token (short
        # name or owner/repo slug) for the displayed entry label.
        env:
          PR_NUMBER:       ${{ inputs.pr_number }}
          MERGE_SHA:       ${{ inputs.merge_sha }}
          DOWNSTREAM:      ${{ matrix.name }}
          REQUESTED_NAME:  ${{ matrix.requested_name }}
          DOWNSTREAM_REPO: ${{ matrix.repo }}
          DEFAULT_BRANCH:  ${{ matrix.default_branch }}
          DEPENDENCY_NAME: ${{ matrix.dependency_name }}
          DOWNSTREAM_REV:  ${{ matrix.rev }}
          MODE:            ${{ matrix.mode }}
          LKG_COMMIT:      ${{ matrix.lkg_commit || '' }}
          FKB_COMMIT:      ${{ matrix.fkb_commit || '' }}
          WORKDIR:         ${{ runner.temp }}/pr-validation
          OUTPUT_DIR:      ${{ runner.temp }}/artifacts/result-${{ matrix.name }}-${{ matrix.rev_slug }}-${{ matrix.mode }}
          TOOL_BIN:        ${{ runner.temp }}/tool-bin
        run: |
          python3 scripts/pr_validation/validate.py \
            --pr-number "$PR_NUMBER" \
            --merge-sha "$MERGE_SHA" \
            --downstream "$DOWNSTREAM" \
            --requested-name "$REQUESTED_NAME" \
            --downstream-repo "$DOWNSTREAM_REPO" \
            --default-branch "$DEFAULT_BRANCH" \
            --dependency-name "$DEPENDENCY_NAME" \
            --downstream-rev "$DOWNSTREAM_REV" \
            --mode "$MODE" \
            --lkg-commit "$LKG_COMMIT" \
            --fkb-commit "$FKB_COMMIT" \
            --workdir "$WORKDIR" \
            --output-dir "$OUTPUT_DIR" \
            --tool-bin "$TOOL_BIN"

      - name: Summarize result
        if: always()
        env:
          DOWNSTREAM: ${{ matrix.name }}
          OUTPUT_DIR: ${{ runner.temp }}/artifacts/result-${{ matrix.name }}-${{ matrix.rev_slug }}-${{ matrix.mode }}
        run: |
          python3 scripts/pr_validation/summarize.py \
            --downstream "$DOWNSTREAM" \
            --output-dir "$OUTPUT_DIR"

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          # Artifact name is keyed on (name, rev_slug, mode) so two entries
          # that differ in any dimension produce two artifacts that the
          # report job can keep separate. `path` points at the per-matrix
          # output dir so result.json / build.log sit at the artifact root.
          name: result-${{ matrix.name }}-${{ matrix.rev_slug }}-${{ matrix.mode }}
          path: ${{ runner.temp }}/artifacts/result-${{ matrix.name }}-${{ matrix.rev_slug }}-${{ matrix.mode }}
          if-no-files-found: error

  report:
    needs: [plan, validate]
    # Skipped when `post_results=false` so the workflow can be exercised
    # without the GitHub App / token plumbing in place. The `result-<name>`
    # artifacts uploaded by `validate` are still available for manual review.
    if: ${{ !cancelled() && needs.plan.outputs.has_downstreams == 'true' && inputs.post_results }}
    runs-on: ubuntu-latest
    # Bind to an environment so the OIDC subject is
    #   repo:leanprover-community/downstream-reports:environment:pr-validation-token
    # rather than a per-branch ref.  The federated credential on the
    # `downstream-reports-automation` Entra app pins to this subject, which
    # means manual dispatches from a feature branch authenticate the same
    # way as production runs from main.
    environment: pr-validation-token
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - uses: actions/download-artifact@v8.0.1
        with:
          path: results
          pattern: result-*
          merge-multiple: false

      - name: Mint App token (for mathlib4)
        id: app_token
        uses: leanprover-community/mathlib-ci/.github/actions/azure-create-github-app-token@3bb576208589a435eeaeac9b144a1b7c3e948760
        with:
          app-id: ${{ secrets.DOWNSTREAM_REPORTS_AUTOMATION_APP_ID }}
          key-vault-name: ${{ vars.MATHLIB_AZ_KEY_VAULT_NAME }}
          key-name: downstream-reports-automation-app-pk
          azure-client-id: ${{ vars.GH_APP_AZURE_CLIENT_ID_DOWNSTREAM_REPORTS_AUTOMATION }}
          azure-tenant-id: ${{ secrets.LPC_AZ_TENANT_ID }}
          owner: leanprover-community
          repositories: mathlib4

      - name: Post result comment
        env:
          GH_TOKEN:      ${{ steps.app_token.outputs.token }}
          PR_NUMBER:     ${{ inputs.pr_number }}
          MERGE_SHA:     ${{ inputs.merge_sha }}
          RUN_URL:       ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TRIGGERED_BY:  ${{ inputs.triggered_by }}
        run: python3 scripts/pr_validation/post_results.py --results-dir results
